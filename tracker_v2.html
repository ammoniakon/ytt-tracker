  "S1-W5-READ-module-c-wk-5-akbh-ch-2-cittaviprayukta-": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 1 (Malcolm: Series I, Class 4)",
    "passage": "Root verses II.22–36 with commentary: citta-caitta analysis — mahābhūmika dharmas, dhyāna-specific factors; cittaviprayukta-saṃskāra (formations dissociated from mind — pṛthagjana-dharma, prāpti, various samāpattis)",
    "why": "The mahābhūmika system is the Abhidharma's most detailed account of the moment-to-moment structure of mind: which mental factors are universally present, which are present only in skillful states, which only in afflicted states. Cittaviprayukta dharmas — formations associated with neither matter nor mind — are the most philosophically contested category in Abhidharma: they include prāpti (the acquisition of a dharma), which is the mechanism by which karma 'belongs' to a particular mindstream without requiring a self as owner. Malcolm's Class 4 covers this in detail. For your YTT: the mahābhūmika analysis maps onto what secular mindfulness frameworks now call 'mental factors' — attention (manaskāra), intention (cetanā), contact (sparśa), feeling-tone (vedanā) — giving you a precise vocabulary for what is happening in any moment of practice.",
    "module_reference": "Module C, Week 5",
    "cross_refs": ["S1-W5-LISTEN-malcolm-akbh-s1c4"]
  },

  "S1-W6-READ-module-c-wk-6-akbh-ch-3-loka-sentient-be": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 1–2 (Malcolm: Series I, Classes 5–6)",
    "passage": "Root verses II.49–73 with commentary: six causes (ṣaḍ-hetu), four conditions (catvāri-pratyaya), five results (pañca-phala); Ch. 3 opening — three realms, six destinies, four types of birth",
    "why": "The six causes, four conditions, and five results of Ch. 2 constitute Abhidharma's complete theory of causation — the most technically important section of the AKBh for understanding how Buddhist causal theory differs from both Western efficient-cause logic and Sāṃkhya-Yoga's guṇa-transformation model. Malcolm's Series I, Class 5 delivers the Īśvara refutation here: 'the world does not proceed from a single cause' — a structural argument from the causal analysis of Ch. 2, not from Ch. 9. This is the single most important structural note for the whole AKBh: the philosophical work of refuting theism is performed in the causal analysis, before the explicitly anti-self chapter. Ch. 3's opening introduces the three realms and six destinies as the cosmological frame in which karmic causation operates.",
    "module_reference": "Module C, Week 6",
    "cross_refs": ["S1-W6-LISTEN-malcolm-akbh-s1c5-c6"]
  },

  "S1-W7-READ-module-c-wk-7-akbh-ch-4-karma-opens-the-": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series I, Classes 6–7)",
    "passage": "Ch. 3: root verses III.1–45 with commentary — three realms, six destinies, four dhyāna heavens cosmologically framed, antarābhava (bardo); root verses III.20–36 — twelve nidānas / pratītyasamutpāda across three lifetimes",
    "why": "Ch. 3's cosmology is structurally necessary: the three-realm architecture is the space in which karma's causal sequences operate across lifetimes. The four dhyāna heavens appear here as cosmological locations inhabited by beings born into them through the merit of meditative absorption — the first appearance of dhyāna content in the AKBh, distinct from the technical meditation-factor analysis of Ch. 8. The antarābhava/bardo analysis is the AKBh's most direct engagement with the period between death and rebirth. The twelve-nidāna analysis distributes the twelve factors across three lifetimes — a structural claim about what pratītyasamutpāda means that differs from the Theravāda one-lifetime model and from modern secular interpretations. Malcolm's Series I, Class 7 makes the three-lifetime structure explicit: you cannot make sense of the twelve nidānas within a single lifetime.",
    "module_reference": "Module C, Week 7",
    "cross_refs": ["S1-W7-LISTEN-malcolm-akbh-s1c6-c7"]
  },

  "S1-W8-READ-module-c-wk-8-akbh-ch-5-anusaya-latent-d": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series I, Class 7)",
    "passage": "Ch. 3: root verses III.24–36 with commentary — twelve nidānas in the three-lifetime model (nidāna distribution: ignorance/formations in a past life; consciousness through sensation in the present life as effect; craving through existence as present-life causes; birth/aging/death as future-life results)",
    "why": "The twelve-nidāna analysis is the AKBh's account of how a sentient being perpetuates rebirth through ignorance and craving — the middle two of the Four Noble Truths rendered in precise causal terms. Malcolm's Class 7 makes the three-lifetime structure explicit: the causal momentum necessarily spans death. This is where the AKBh's rebirth framework becomes structurally load-bearing — not as a religious belief but as a necessary feature of the causal model. For your YTT: teachers often simplify 'dependent origination' as moment-to-moment arising; the AKBh's version requires much more precision. The distinction between how the nidānas function as causal process (projecting future rebirth) and how they function as the content of present experience (arising of suffering through contact and sensation) is the key distinction Malcolm clarifies in this class.",
    "module_reference": "Module C, Week 8",
    "cross_refs": ["S1-W8-LISTEN-malcolm-akbh-s1c7"]
  },

  "S1-W9-READ-module-c-wk-9-akbh-ch-5-klesa-map-contin": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series I, Class 8 + Series II, Class 1, Part 1)",
    "passage": "Ch. 4: root verses IV.1–30 with commentary — karma as cetanā, ten paths of action (daśa-karma-pathāḥ), meritorious/demeritorious/imperturbable karma, vāsanā; IV.31–50: vows, avijñapti, pratimokṣa vow as rūpa-skandha modification",
    "why": "Ch. 4's opening is Vasubandhu's most direct statement: karma is cetanā (mental intention) — the bodily and verbal paths are extensions of mental karma, not independent physical categories. This fundamentally differs from behavioral accounts of karma in popular yoga teaching. The ten paths of action provide the ethical taxonomy: three bodily (killing, stealing, sexual misconduct), four verbal (lying, divisive speech, harsh speech, idle chatter), three mental (covetousness, malice, wrong view). The vāsanā — the latent impression karma leaves in the mindstream — is the mechanism that makes karma persist without a permanent self as vessel. The vow analysis: taking a pratimokṣa vow materially changes the rūpa-skandha (avijñapti as the somatic trace of commitment). This is the AKBh's most startling practical assertion — ethical commitments have somatic reality, not just psychological significance.",
    "module_reference": "Module C, Week 9",
    "cross_refs": ["S1-W9-LISTEN-malcolm-akbh-s1c8-s2c1p1"]
  },

  "S1-W10-READ-module-c-wk-10-akbh-ch-5-continued-full-": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series II, Class 1 Parts 2–4 + Class 2 Part 1)",
    "passage": "Ch. 4 continued: root verses IV.51–80 with commentary — bīja (seed) model of karmic storage on the mindstream; four types of karmic ripening (vipāka); four causes of death; āyur-indriya (life-faculty) as karmic measure",
    "why": "The bīja model is Abhidharma's answer to the central question: how does karma persist and ripen without a permanent self as substrate? Answer: karma leaves a seed (bīja) in the causal continuum of the mindstream — not a stored object but a causal potentiality. This model directly anticipates Yogācāra's ālaya-vijñāna (storehouse consciousness), which Vasubandhu himself will develop after leaving Sarvāstivāda. The four types of karmic ripening give a practical priority ordering that has direct implications for teaching. The four causes of death and the āyur-indriya complete Ch. 4: life is a karmically determined quantity that is depleted by time and by the arising of destructive karma.",
    "module_reference": "Module C, Week 10",
    "cross_refs": ["S1-W10-LISTEN-malcolm-akbh-s2c1p2-c2p1"]
  },

  "S1-W11-READ-module-c-wk-11-akbh-ch-5-close-bridge-to": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series II, Class 2 Parts 2–4 + Class 3 Part 1)",
    "passage": "Ch. 4 close + Ch. 5 opening: root verses IV.82–95 — conclusion of karma's results; V.1–15: anuśaya as latent affliction, six root kleśas, five wrong views",
    "why": "Ch. 4 closes with karma's results in full, transitioning into the conditions for future accumulation. Ch. 5's opening introduces the concept that makes sense of the entire karma chapter: anuśaya — not a manifest kleśa but a latent tendency that persists in the mindstream as a causal potentiality, activating when conditions are right. Six root kleśas: rāga (desire/attachment), pratigha (aversion), māna (pride), avidyā (ignorance), dṛṣṭi (view — five subtypes), vicikitsā (doubt). The five wrong views are the AKBh's precise diagnosis of the views that sustain saṃsāra: satkāya-dṛṣṭi (the view of a real self in the aggregates) is listed first, as the root of the others. This is the Module C week most directly relevant to the ātman/anātman tension in Module D — the AKBh names the problem with maximum technical precision.",
    "module_reference": "Module C, Week 11",
    "cross_refs": ["S1-W11-LISTEN-malcolm-akbh-s2c2p2-c3p1"]
  },

  "S1-W12-READ-module-c-wk-12-akbh-ch-6-marga-the-path-": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (Malcolm: Series II, Class 3)",
    "passage": "Ch. 5: root verses V.1–50 with commentary — six root kleśas in detail, five wrong views analyzed, anuśaya vs. paryavasthāna (latent vs. manifest affliction). Note: Module C's recalibrated scope ends with Ch. 5; the Ch. 6 (mārga) preview in the item label is via Malcolm's Series II overview only — engage Ch. 5 as the primary reading.",
    "why": "Malcolm's Class 3 of Series II covers Ch. 5 in full: the complete kleśa taxonomy, the five wrong views in their AKBh technical sense, and the operational distinction between anuśaya (latent, dormant) and paryavasthāna (manifest, arising). This distinction — the same kleśa can be either latent or manifest depending on conditions — is the Abhidharma's most refined contribution to the psychology of affliction. It directly models what clinical practitioners describe as activated vs. dormant trauma patterns, using a different vocabulary. The Ch. 6 mārga preview is an anticipation of material Module C's first semester does not formally include; Malcolm's Series II Class 6 provides only overview-level coverage of Chs. 6–9, which the audit recommends deferring to a future semester.",

  },

  "S1-W13-READ-module-c-wk-13-madhyamika-critique-of-ab": {
    "source": "Abhidharmakośabhāṣyam; Vigrahavyāvartanī",
    "author": "Vasubandhu; Nāgārjuna",
    "translator": "Gelong Lodrö Sangpo (AKBh, Motilal 2012); Jan Westerhoff (VV, Oxford 2010)",
    "edition": "Motilal Banarsidass, 2012, Vol. 2 (AKBh) + VV translation (Malcolm: Series II, Class 4)",
    "passage": "AKBh Ch. 5 continued: root verses V.50–78 with commentary — 98 anuśayas by realm and abandonment, three āsravas, three conditions for kleśa arising. Cross-read with MMK Ch. 24 (from Module B) for the Mādhyamika engagement with the AKBh framework.",
    "why": "The 98 anuśayas distributed by realm and abandonment represent Abhidharma precision carried to its maximum: a complete map of where in the three realms, and in which type of cognition, each afflictive tendency resides and can be abandoned. The three conditions for kleśa arising (seed, corresponding object, absence of antidote) model affliction as conditional — a position Nāgārjuna's Mādhyamika pushes further: if kleśas arise dependently, they have no fixed essence, and their abandonment is not the elimination of a thing but the dissolution of conditions. Malcolm's Class 4 is the primary lecture for this week's 98-anuśaya material. The cross-read with MMK Ch. 24 activates the Mādhyamika critique that is Module B's structural response to everything Module C has built.",
    "module_reference": "Module C, Week 13",
    "cross_refs": ["S1-W13-LISTEN-malcolm-akbh-s2c4"]
  },

  "S1-W5-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 5 Training Videos — Prāṇa Vāyus, Subtle Body Anatomy, Āsana Methodology",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 5 video modules)",
    "why": "Week 5 videos introduce the five prāṇa vāyus (prāṇa, apāna, samāna, udāna, vyāna) and the subtle-body physiology underlying āsana and prāṇāyāma instruction. Watch for how the vāyu model maps onto cuing: apāna-grounding cues for standing poses, udāna-lifting cues for inversions. The T3 tension lives here — the vāyu model is a teaching structure, not a metaphysical claim about literal winds; hold it lightly. Cross-reference with Manual Section 4 (this week's READ) for the physical/energetic interface and with Module B Week 5 for the Mādhyamika view on what a 'prāṇa vāyu' could be if all phenomena are dependently arisen.",
    "module_reference": "Module D, Week 5"
  },

  "S1-W6-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 6 Training Videos — Sequencing Principles, Class Architecture, Theming",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 6 video modules)",
    "why": "Week 6 videos focus on the architecture of a yoga class: peak-pose sequencing, warm-up logic, counter-pose principles, and how to thread a philosophical theme without forcing it. The theming instruction is Module D's direct analogue to Module B's upāya-kauśalya (skillful means): a theme is only well-chosen if it serves the students in the room, not the teacher's intellectual interest. Note how the sequencing logic is actually Abhidharmic — cause-and-effect chains of muscle preparation — even when it doesn't use that language. Cross-reference with Manual Section 5 and Betsy Ng's SDT paper on how intrinsic motivation maps onto theming that doesn't overwhelm students.",
    "module_reference": "Module D, Week 6"
  },

  "S1-W7-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 7 Training Videos — Cueing Language, Hands-On Assists, Trauma-Informed Teaching",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 7 video modules)",
    "why": "Week 7 videos address the ethics and mechanics of physical assists and the language of permission-based cuing. The trauma-informed framing is the YTT's practical engagement with the cognitive-science material from Lifshitz & Veissière (this week's D-LISTEN): predictive processing and interoceptive cuing interact directly — verbal cues update priors, and hands-on assists either confirm or disrupt the student's body schema. Watch for how the videos' cueing language implicitly trains interoception, and note where it aligns with or diverges from the Shaiva notion of samāveśa (absorption into the teacher's state) from Kṣemarāja.",
    "module_reference": "Module D, Week 7"
  },

  "S1-W8-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 8 Training Videos — Prāṇāyāma Techniques, Bandhas, Chakra System",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 8 video modules)",
    "why": "Week 8 videos go deep on prāṇāyāma (nāḍī śodhana, kumbhaka variations, śītalī, bhrāmarī) and introduce the bandha system (mūla, uḍḍīyāna, jālandhara) and the chakra model. The chakra system is a cross-traditional synthesis — not purely Tantric, not purely Vedāntic — and is one of the most contested T3 zones in modern yoga. Hold Kirkland's analysis (this week's D-LISTEN) alongside the video content: where does the manual's chakra model do the same functional work as a different tradition's map of the same territory? Cross-reference with Kṣemarāja sūtra 19 on samāveśa — the bandhas as a technology of samāveśa through the physical body.",
    "module_reference": "Module D, Week 8"
  },

  "S1-W9-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 9 Training Videos — Yoga Philosophy Survey, Sāṃkhya, Vedānta, Tantra Overview",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 9 video modules)",
    "why": "Week 9 videos offer the YTT's own philosophy survey — likely covering Sāṃkhya's puruṣa/prakṛti model, Advaita Vedānta's non-dual framing, and a light Tantra introduction. This is the moment to hold the entire map at once: watch where the YTT's philosophy is internally consistent, where it elides real doctrinal tensions, and where it performs synthesis that requires careful scrutiny. The T4 tension — cross-traditional compatibility — is fully activated here. Cross-reference with Manual Section 8 and the Module A Week 9 six-lamps reading: how does the YTT's subtle-body model compare to the Dzogchen kati channel system?",
    "module_reference": "Module D, Week 9"
  },

  "S1-W10-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 10 Training Videos — Teaching Practicum Review, Feedback Culture, Observation Skills",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 10 video modules)",
    "why": "Week 10 videos focus on practicum pedagogy: how to observe students, give feedback without projection, and develop teaching intuition. This is Module D's applied ethics zone — the Ratnāvalī ethic (Module B Week 14, previewed here) grounds teacher-student relationship not in authority but in care without clinging. Cross-reference with Capriles' Four Noble Truths of Ecology (this week's D-LISTEN) for the meta-question: what does it mean to teach something skillfully when the teaching context (modern yoga) is itself embedded in problematic cultural and economic structures? Also cross-reference with Anand's neuroscience material on interoception as feedback.",
    "module_reference": "Module D, Week 10"
  },

  "S1-W11-LISTEN-myvinyasapractice-videos": {
    "speaker": "My Vinyasa Practice faculty",
    "talk_title": "Week 11 Training Videos — Business of Yoga, Ethics of Teaching, Community Building",
    "source": "My Vinyasa Practice 300-hr YTT online platform (Week 11 video modules)",
    "why": "Week 11 videos address the real-world context of teaching: studio culture, social media, pricing, the economic precarity of yoga teaching, and the ethics of representing traditions you've studied for a limited time. This is the most unguarded moment in the YTT — where commercial realities show through the philosophical framing. Hold Norbu's Teachers' Training material (this week's D-READ) alongside this: what does it mean to receive a teaching lineage vs. completing a certification? How does the commercial yoga world's logic of branding and credentialing sit against the Dzogchen transmission model? The tension is not a critique — it is the live philosophical question for Module D's final synthesis.",
    "module_reference": "Module D, Week 11"
  },

  "S1-W5-READ-ytt-manual-section-4-subtle-energy-physi": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 4 — Subtle Energy + Physical Body Interaction, Nervous System, Fascia, Prāṇāyāma Anatomy",
    "why": "Section 4 is where the YTT manual imports the most scientifically contested claims: fascia as a prāṇic medium, the nervous system as the physical correlate of the prāṇamaya kosha, prāṇāyāma anatomy framed as directly controlling energetic states. Read analytically: locate the specific claims, identify whether each is empirical (testable), metaphysical (structural), or functional (useful regardless of truth). The fascia-prāṇa claim is where Module B Week 5 (dependent origination and the nervous system) connects most directly to the YTT material — the ANS doesn't have intrinsic states stored in fascia; tone arises dependently. Track every place where the manual asserts a direct isomorphism between physical anatomy and subtle-body anatomy — those are the T3 (prapañca/māyā) flashpoints.",
    "module_reference": "Module D, Week 5"
  },

  "S1-W5-READ-satchidananda-ys-326348-samyama-on-the-b": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 3 (Vibhūti Pāda): 3.26–3.48 (saṃyama on the body and its elements — forms, sounds, strength, subtle body perception)",
    "why": "Book 3's siddhis-by-saṃyama section is the most philosophically revealing part of the Yoga Sūtras for your YTT work because it makes explicit what is usually implicit: the practitioner's body is the object of a purified knowing-faculty (saṃyama = dhāraṇā + dhyāna + samādhi directed at a single object). Sūtras 3.26–3.48 describe what is known when saṃyama is directed at the body's gross elements, subtle body, and constitutional structure. The siddhi-list is philosophically important not because the siddhis are real or unreal but because it reveals the epistemological architecture Patañjali assumes: the same subject-object structure, now applied to the body itself. MMK Ch. 10–12 (fire-and-fuel relational analysis) applies directly here: can saṃyama have intrinsic access to its object, or is the knowing-relation itself dependently constituted?",
    "module_reference": "Module D, Week 5"
  },

  "S1-W5-READ-iyengar-loy-asana-intro-56-specific-asan": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Āsana introduction chapter; 5–6 specific āsana descriptions from your current teaching practice — read for the implicit model of the practitioner embedded in each description",
    "why": "Iyengar's āsana descriptions consistently import a unified practitioner-self as the agent and beneficiary of alignment. His language — 'the brain becomes quiet,' 'the spine is extended,' 'the soul is refreshed' — assumes a continuous self that persists from the preparation to the result. Read five or six poses you actually teach and audit the implicit anthropology: who is doing the work, who benefits, what is the relationship between the instruction-following practitioner and the practitioner who emerges from the pose? This audit is the cue-log methodology in practice. Iyengar's descriptions also carry implicit aesthetic norms about the correctly-aligned body that Week 11's adaptive yoga module will interrogate directly.",
    "module_reference": "Module D, Week 5"
  },

  "S1-W5-READ-ksemaraja-pratyabhijnahrdayam-sutra-14-f": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 14 with commentary (Singh pp. 89–95): the fivefold activity of citi-śakti — creation (sṛṣṭi), sustenance (sthiti), withdrawal (saṃhāra), concealment (vilaya/tirodhāna), grace (anugraha)",
    "why": "Sūtra 14 catalogs the five activities already introduced in sūtras 1–4 but now in their complete form. Each activity corresponds to a stage in the contracted experient's relationship to citi: creation is the appearance of the world; sustenance is its persistence; withdrawal is the return of appearances to citi; concealment is the veil of māyā; grace is the lifting of that veil. For your YTT: the five activities are structurally mirrored in how yoga teachers often frame practice — creation (setting intention), sustenance (the flow), withdrawal (śavāsana), concealment (the conditioning that brought students to the mat), grace (the moment of recognition). Read the commentary carefully for how tirodhāna and anugraha relate as a pair: the grace that lifts the veil is itself an activity of the citi that placed the veil. This self-referential structure is what Candrakīrti's svasaṃvedana refutation (Module B Week 12) directly attacks.",
    "module_reference": "Module D, Week 5"
  },

  "S1-W5-READ-d-integration-anand-neuroscience-of-yoga": {
    "source": "Neuroscience of Yoga, Part 1",
    "author": "Anand (check Module D materials for full citation)",
    "passage": "Autonomic regulation, HPA-axis response, vagal tone — introductory chapters",
    "why": "This is the empirical substrate for Week 5's fascia-prāṇa audit. Anand's coverage of autonomic regulation, cortisol/HPA-axis response, and vagal tone provides the neuroscience vocabulary for what yoga teachers describe in prāṇic terms. Read it alongside the YTT Manual's Section 4: where do the neural mechanisms map onto the prāṇic descriptions? Where do they fail to map — i.e., where does the prāṇic model make claims the neuroscience neither supports nor contradicts because the two frameworks are not actually making the same type of claim? That gap is not a problem to be solved but a place to be precise.",
    "module_reference": "Module D, Week 5 (D-integration)"
  },

  "S1-W5-READ-d-integration-murphy-brewer-interoceptio": {
    "source": "Interoception: A Comprehensive Guide",
    "author": "Murphy & Brewer (check Module D materials for full citation)",
    "passage": "Introductory chapters defining interoception and its relationship to affect, self-perception, and wellbeing",
    "why": "Interoception — the perception of internal body states — is the neuroscientific concept that most precisely parallels what yoga calls 'listening to the body' or 'prāṇic awareness.' Murphy & Brewer's introduction establishes the technical definition (interoception as afferent signals from viscera, muscles, and fascia processed via insular cortex) and the research showing its relationship to affect regulation and sense of self. The key question this raises for Module D: is yoga's prāṇic framework a folk-theory of interoception (a culturally specific description of the same phenomena), a distinct ontological framework (describing something interoception does not), or both? Hold this alongside AKBh's vedanā (feeling-tone) as a discrete dharma — all three frameworks are mapping the same somatic territory with different ontological commitments.",
    "module_reference": "Module D, Week 5 (D-integration)"
  },

  "S1-W6-READ-ytt-manual-section-5-sequencing-logic-as": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 5 — Sequencing Logic, Āsana Architecture, Mind-Body in Āsana, Chakra-Informed Sequencing",
    "why": "Section 5 is the most directly testable section of the YTT manual for Week 6's WRITE assignment (designing a sequence on pratītyasamutpāda principles). The sequencing logic the manual provides — warm-up, peak pose, counter-pose — is a causal narrative: each section prepares the next. Audit the implicit causal model: is each transition described as sufficient causation ('this opens that'), necessary condition ('the body needs X before Y'), or something weaker? The chakra-informed sequencing section is the most philosophically committed: it imports the claim that poses act on specific energetic centers in a predictable way. Apply MMK Ch. 15 (svabhāva): if a pose had intrinsic energetic properties, it would affect every practitioner identically and unconditionally. It doesn't. The sequencing logic can be preserved as dependent-arising description without the svabhāva commitment.",
    "module_reference": "Module D, Week 6"
  },

  "S1-W6-READ-satchidananda-ys-112116-abhyasa-and-vair": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 1: 1.12–1.16 (abhyāsa and vairāgya — practice and non-attachment as the two means); Book 2: 2.46–2.53 (āsana as sthira-sukha; prāṇāyāma; pratyāhāra)",
    "why": "Sūtras 1.12–1.16 introduce the fundamental polarity of the Yoga Sūtras: abhyāsa (sustained practice — effort, repetition, commitment) and vairāgya (non-attachment — the progressive loosening of the mind's grip on objects). Satchidananda's commentary consistently identifies the thing to which one becomes non-attached as objects of consciousness, not as the Puruṣa-witness. But notice: vairāgya at its highest (para-vairāgya, 1.16) is described as non-attachment arising from discriminative knowledge of the Puruṣa — the Seer becoming clear about its own nature. This is where Patañjali's dualism and the Trika's non-dualism diverge most clearly: for Patañjali, the witness is always already there; for Kṣemarāja, what is recognized is not a pre-existing witness but citi's self-recognition. The āsana sūtras (2.46–2.48) define the pose as the resolution of effort and effortlessness — a definition that translates directly into sequencing language without requiring any specific metaphysics.",
    "module_reference": "Module D, Week 6"
  },

  "S1-W6-READ-iyengar-loy-asana-classification-section": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Āsana classification sections (forward bends, back bends, twists, inversions); at least one complete standing pose set with all accompanying descriptions",
    "why": "Iyengar's classification system is a tacit theory of what different types of movement do to the practitioner. Read the classification descriptions for their implicit claims: inversions 'reverse the downward flow of prāṇa,' back bends 'open the heart center,' twists 'detoxify the organs.' Each claim carries a model of the practitioner as a container with directional flows and locations that can be affected. Apply MMK Ch. 13 (conjunction analysis): if forward bends have the intrinsic property of 'calming,' this property must be either in the pose itself (then it would always calm every practitioner), or in the practitioner (then the pose does nothing), or in neither (then the effect is dependently designated). Dependent designation is the correct answer — and it is fully compatible with the practical wisdom embedded in the classification system, just not with the intrinsic-property framing.",
    "module_reference": "Module D, Week 6"
  },

  "S1-W6-READ-ksemaraja-pratyabhijnahrdayam-sutra-8-un": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 8 with commentary (Singh pp. 75–84): unmeṣa (opening, expansion) and nimeṣa (closing, contraction) as the pulse of citi-śakti; spanda as the basic vibration of consciousness",
    "why": "Sūtra 8 introduces spanda — the vibration or pulse of citi-śakti — as the underlying rhythm of all manifestation. Unmeṣa is consciousness opening into manifestation; nimeṣa is consciousness withdrawing. This is the Trika's kinesthetic metaphysics: the universe breathes. For Week 6's sequencing work, this is the most productive Kashmir Shaivism contribution: a sequence structured on unmeṣa/nimeṣa is a sequence that breathes rather than progresses — each pose is a gathering (nimeṣa) that enables the next expansion (unmeṣa). This image is philosophically honest even for a teacher who does not hold the Trika's metaphysical commitments: it describes the phenomenology of a well-sequenced class without asserting that citi has svabhāva. It is the Trika's most pedagogically portable concept.",
    "module_reference": "Module D, Week 6"
  },

  "S1-W6-READ-d-integration-betsy-ng-ed-self-determina": {
    "source": "Self-Determination Theory and Socioemotional Learning",
    "author": "Betsy Ng (ed.) (check Module D materials for full citation)",
    "passage": "Autonomy-supportive teaching chapters",
    "why": "Self-Determination Theory (Deci & Ryan) identifies three basic psychological needs — autonomy, competence, relatedness — as universal conditions for intrinsic motivation and wellbeing. The autonomy-supportive teaching research is the empirical counterpart to the upāya-kauśalya principle from Module B: effective teaching adapts to the student's actual locus of control rather than imposing a predetermined developmental trajectory. For your YTT: autonomy-supportive language ('you might try,' 'notice what happens if,' 'your body knows') is not merely pedagogically kind — it reflects a philosophical position about whether students are agents or recipients. Read this alongside the Week 6 sequencing material: a chakra-determined sequence presupposes that the teacher knows what the student needs; autonomy-supportive sequencing presupposes that the student's present-moment experience is the relevant data.",
    "module_reference": "Module D, Week 6 (D-integration)"
  },

  "S1-W7-READ-ytt-manual-section-6-female-anatomy-repr": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 6 — Female Anatomy, Reproductive Cycle, Developing Fetus, Fourth Trimester",
    "why": "Section 6 introduces the first deeply relational context in the YTT curriculum: the pregnant body as a self-in-relation. The manual's framing tends to individualize — what the pregnant practitioner experiences, what poses to modify, what trimester-specific risks to navigate — but the underlying situation is irreducibly relational. Read Section 6 for what it assumes about the boundaries of the 'student': is the developing fetus counted as a second student? A part of the first? Neither? The anatomical framing (reproductive cycle, fetal development, fourth trimester) carries the standard medical model of separate organisms. Week 7's WRITE assignment asks you to apply anātman frameworks to this relational complexity — Section 6 provides the clinical material that the philosophy has to engage with.",
    "module_reference": "Module D, Week 7"
  },

  "S1-W7-READ-satchidananda-ys-230245-yamas-niyamas-in": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 2: 2.30–2.45 (yamas and niyamas in full detail); particular attention to ahiṃsā (2.35) and aparigraha (2.39)",
    "why": "The yamas and niyamas are the ethical architecture of the Yoga Sūtras — and Satchidananda's commentary is explicit about grounding them in the ātman framework: ahiṃsā is non-harm because all beings share the same Ātman; aparigraha (non-possessiveness) is possible because the Puruṣa-witness possesses nothing. Track how each yama/niyama Satchidananda explains requires the ātman as its metaphysical foundation. Then test: can ahiṃsā be grounded in anātman instead? The Buddhist version: non-harm because all beings arise interdependently and any harm ripples through the causal continuum — no ātman required. The Madhyamaka version: non-harm because neither self nor other has intrinsic existence, so the distinction that would justify harm cannot be established. Week 7's prenatal context makes ahiṃsā most acute: whose harm counts, and on what metaphysical basis?",
    "module_reference": "Module D, Week 7"
  },

  "S1-W7-READ-iyengar-loy-sections-on-womens-health-as": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Sections on women's health āsanas and supported inversions (Sarvāṅgāsana family) — read for the model of the female body embedded in the prescriptions",
    "why": "Iyengar's women's health sections were written in 1966 and reflect assumptions about the female body as a primarily reproductive body — prescriptions organized around menstrual cycle, pregnancy, and menopause. Read analytically: what body is the implicit standard from which these sections deviate? The prescriptions for women are framed as modifications, not as a distinct practice — which means the default practitioner is implicitly male. This is the normative-body question Week 11's adaptive yoga assignment begins to address, but its roots are visible here. For your teaching: Iyengar's supported inversions are genuinely therapeutically valuable; the question is whether you can teach them without importing the normative-body framing that makes them 'modifications for women.'",
    "module_reference": "Module D, Week 7"
  },

  "S1-W7-READ-ksemaraja-pratyabhijnahrdayam-sutra-13-c": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 13 with commentary (Singh pp. 86–89): cidānanda-lābha — the attainment of consciousness-bliss as the fruit of recognition",
    "why": "Sūtra 13 names the result of Trika recognition: cidānanda-lābha — the 'attainment' of consciousness-bliss (cit + ānanda). The scare-quotes around attainment are important: Kṣemarāja is explicit that what is attained is not new but recognized — cit and ānanda are always already the nature of the experient, merely concealed by tirodhāna. This is the Trika's strongest answer to the anātman challenge: the recognition is not of a new Self but of what the contracted experient already was. For Week 7's prenatal context: cidānanda-lābha in a relational body raises the question of whose consciousness-bliss is recognized. Does the Trika's non-dual framework have a more honest account of relational subjectivity in pregnancy than the individual-ātman model does? Compare with Module A's gzhi-recognition: both point toward the dissolution of the subject-object boundary, but the Trika maintains a positive characterization (bliss) that Dzogchen is more careful about.",
    "module_reference": "Module D, Week 7"
  },

  "S1-W7-LISTEN-lifshitz-veissiere-cultural-neurophenome": {
    "speaker": "Lifshitz & Veissière",
    "talk_title": "Cultural Neurophenomenology (check Module D materials for exact talk title and source)",
    "source": "Check Module D materials for recording/lecture link",
    "why": "Lifshitz and Veissière's cultural neurophenomenology work bridges embodied cognitive science and cultural anthropology: the claim that cultural practices shape the phenomenology of experience at the neural level, not just at the level of interpretation. For your YTT: this means the teacher's cultural framing of a practice (Vedāntic, Buddhist, secular-mindfulness) is not merely a layer of interpretation applied after the somatic experience occurs — it shapes the experience itself. Listen for their treatment of 'sociocultural shaping of experience' and 'cultural scaffolding': these concepts give you a neuroscience-grounded vocabulary for why the philosophical frameworks Module D is examining are not merely academic. They are conditions of what students actually experience in your classes.",
    "module_reference": "Module D, Week 7 (D-integration)"
  },

  "S1-W8-READ-ytt-manual-section-7-cns-regulation-nerv": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 7 — CNS Regulation, Nervous System, Props, Therapeutic Sequencing",
    "why": "Section 7 introduces the clinical dimension of the YTT curriculum: the nervous system as the target of therapeutic sequencing, props as tools for modifying the physiological state. Read it alongside the Week 8 WRITE assignment on surrender: the therapeutic model implies that the practitioner has a nervous system that can be regulated by external interventions (props, instructions, sequencing). The philosophical question: who is the 'one' whose nervous system is regulated? If ANS regulation is dependently conditioned (nothing stored, everything arising contextually), then the therapeutic model is accurate at the functional level while needing to be more precise about the metaphysics of where 'dysregulation' lives. Section 7's prop prescriptions are also the first place where the instructor's authority to know what the student's body needs is most explicit — the autonomy-supportive critique from Week 6's D-integration applies here.",
    "module_reference": "Module D, Week 8"
  },

  "S1-W8-READ-satchidananda-ys-130139-obstacles-isvara": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 1: 1.30–1.39 (the nine obstacles to yoga + their antidotes; īśvarapraṇidhāna as the universal antidote); 2.46–2.48 (āsana as sthira-sukha, effort and effortlessness)",
    "why": "Sūtras 1.30–1.39 are the most practical section of Book 1: the nine obstacles (vyādhi — disease; styāna — mental laziness; saṃśaya — doubt; pramāda — negligence; ālasya — physical laziness; avirati — sensory craving; bhrāntidarśana — false perception; alabdhabhumikatva — non-attainment; anavasthitatva — instability) and their antidotes. Satchidananda's antidote is unified: īśvarapraṇidhāna — surrender to Īśvara, the special Puruṣa untouched by afflictions. Note: AKBh Week 6 is where Malcolm refutes Īśvara using the single-cause argument; here Patañjali makes Īśvara the cornerstone of practice. This is not a contradiction to be resolved but a genuine philosophical fork: Patañjali's therapeutic prescription requires an Īśvara that the Abhidharma's causal analysis rules out. For Week 8's WRITE assignment (surrender without ātman), this fork is the primary material.",
    "module_reference": "Module D, Week 8"
  },

  "S1-W8-READ-iyengar-loy-savasana-and-viparita-karani": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Śavāsana description and instructions; Viparīta Karaṇī (inverted action pose) description",
    "why": "Iyengar's Śavāsana description is the most philosophically instructive passage in the book because it names the target state most explicitly: 'the body is dead but the mind is alert.' He describes Śavāsana as difficult because 'the untrained person finds it very difficult to keep his mind still' — which presupposes a mind as a stable entity that can be kept still, and a self that can observe whether it is. Read against Week 8's WRITE assignment (three accounts of surrender), this passage is the Iyengar account: the soul rests, the body is quiet, the practitioner observes. The Śavāsana instruction is the most compressed form of the YTT's implicit metaphysics — a permanent observer resting in a temporary body.",
    "module_reference": "Module D, Week 8"
  },

  "S1-W8-READ-ksemaraja-pratyabhijnahrdayam-sutra-19-s": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 19 with commentary (Singh pp. 100–108): samāveśa (immersion/absorption into citi) and cittapralaya (dissolution of the empirical mind into the universal)",
    "why": "Sūtra 19 describes the experiential event of Trika liberation: samāveśa — absorption of the individual consciousness into citi-śakti. Cittapralaya is the dissolution of the constructed empirical mind (citta as mind-stuff) back into citi (consciousness as such). For Week 8's restorative yoga context: samāveśa is the Trika's positive characterization of what happens in deep rest — not the cessation of an observer (as Buddhist accounts suggest) but the dissolution of the constructed observer back into its origin. The philosophical difference: Madhyamaka's account of deep rest is the cessation of conditions for the arising of the constructed-self sense; Trika's account is the recognition of what was always already present beneath the construction. Both are compatible with the somatic phenomenology of restorative practice; they diverge in what they claim is recognized.",
    "module_reference": "Module D, Week 8"
  },

  "S1-W8-READ-d-integration-chogyal-namkhai-norbu-teac": {
    "source": "Teachers' Training",
    "author": "Chögyal Namkhai Norbu",
    "edition": "Check Module D materials for edition",
    "passage": "Opening chapters on teacher's responsibility in pointing-out moments",
    "why": "Norbu's Teachers' Training opens with an account of what the teacher's function is in direct introduction to the natural state: the teacher does not transmit a doctrine but creates the conditions under which the student's own recognition becomes possible. This account of the pointing-out instruction (ngo sprod) is the Dzogchen framework's most direct contribution to your yoga pedagogy question: pointing-out is not explanation but condition-setting. For Week 8's restorative context: a Śavāsana instruction delivered from within one's own samāveśa or natural-state recognition functions differently than the same instruction delivered from within ordinary ego-consciousness — not because the words are different but because the energetic condition of the delivery changes what becomes possible for the student. Norbu's opening chapters give this claim philosophical grounding.",
    "module_reference": "Module D, Week 8 (D-integration)"
  },

  "S1-W8-LISTEN-kirkland-harnessing-the-power-of-physica": {
    "speaker": "Kirkland (check Module D materials for full name and talk title)",
    "talk_title": "Harnessing the Power of Physical Practice (check Module D materials for exact title)",
    "source": "Check Module D materials for recording/lecture link",
    "why": "Kirkland's talk provides the empirical framing for what physical yoga practice demonstrably does — distinguishing between what the research supports (nervous system regulation, interoceptive accuracy, affect modulation) and what is asserted without empirical support (prāṇic circulation, chakra activation, kosha purification). For your YTT: this is the reality check that precedes the Week 8 WRITE assignment. You need to know what actually happens in a restorative class before you can write about it using the three philosophical frameworks. Kirkland's vocabulary for the documented effects is the shared empirical floor that all three frameworks (Trika, Madhyamaka, Dzogchen) can be evaluated against.",
    "module_reference": "Module D, Week 8 (D-integration)"
  },

  "S1-W9-READ-ytt-manual-section-8-daoism-yin-yang-mer": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 8 — Daoism, Yin-Yang, Meridians, Fascia, Long Holds",
    "why": "Section 8 introduces a fourth philosophical tradition into the YTT curriculum alongside Vedānta, Sāṃkhya, and Tantra: Daoism. The yin-yang framework differs structurally from all the other traditions in the manual because it does not posit a transcendent ground (no Brahman, no Puruṣa, no Śiva) — the Dao is the process itself, and the yin/yang polarity is immanent within that process. This makes it the most compatible with the anātman frameworks and the most challenging for the YTT's usual transcendent-ground assumptions. Read Section 8 carefully for how the manual imports yin-yang: is it used as a process-description (cold/hot, passive/active as relational qualities) or as a substance-description (yin as a substance stored in organs)? The meridian system is the most contested: acupuncture's qi-channel model has partial empirical support (connective tissue planes) but is not identical to any known anatomical structure.",
    "module_reference": "Module D, Week 9"
  },

  "S1-W9-READ-satchidananda-ys-112116-revisit-abhyasa-": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 1: 1.12–1.16 (abhyāsa and vairāgya) — revisit with yin-yang and long-hold phenomenology in mind",
    "why": "The abhyāsa/vairāgya polarity maps cleanly onto the yin/yang pair in ways worth examining: abhyāsa (sustained practice, effort, active engagement) is structurally yang; vairāgya (non-attachment, releasing, effortless awareness) is structurally yin. But the Yoga Sūtras' architecture insists both are necessary simultaneously — there is no yin practice without the yang of showing up, no yang practice without the yin of non-grasping. The re-read asks: does Satchidananda's commentary import a preference between the two? Is there a subtle teleology toward vairāgya (quieting the mind) over abhyāsa (the effort of practice)? For Yin yoga specifically: the long-hold phenomenology foregrounds vairāgya, but the discipline of staying in the hold requires abhyāsa. Hold this structural parallel lightly — it is a useful teaching tool without being a philosophical identity claim.",
    "module_reference": "Module D, Week 9"
  },

  "S1-W9-READ-iyengar-loy-forward-bend-descriptions-pa": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Forward-bend descriptions (Paścimottānāsana family) — read for what sustained passive stretching is described as doing to the practitioner",
    "why": "Forward bends in Iyengar are often described as 'calming the mind,' 'cooling the nerves,' 'stretching the spine and hamstrings.' Read for the causal claims embedded in each description: what is being stretched (a structure with intrinsic properties? a dependently conditioned configuration?), and what is the mechanism by which the stretch produces its claimed effect? The long-hold yin approach to forward bends foregrounds a different phenomenology than Iyengar's dynamic-alignment approach: in Yin, the instruction is to find the first edge of resistance and stop, letting time rather than effort do the work. Iyengar's model assumes an alignment target; Yin's model assumes a tissue-response process. These are not merely different techniques but different models of what the body is and how it changes.",
    "module_reference": "Module D, Week 9"
  },

  "S1-W9-READ-ksemaraja-pratyabhijnahrdayam-sutra-8-re": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 8 (revisit): unmeṣa/nimeṣa and spanda — re-read with yin-yoga and long-hold phenomenology in mind",
    "why": "The spanda re-read for Week 9 activates a different layer than the Week 6 sequencing application. In a long yin hold, what is actually pulsing? Kṣemarāja's spanda is not a rhythmic physical pulse but the fundamental vibration of citi-śakti at the level of experience itself — the quality of aliveness that persists even in stillness. For the long-hold context: the instruction to 'find the pulse' in a still pose is a pointing-toward-spanda instruction, whether the teacher knows the Trika or not. The phenomenological report that practitioners often give from long holds — 'everything became very alive,' 'the stillness started vibrating' — is the somatic correlate of what sūtra 8 describes. Hold this as a contemplative research question: does the experience you observe in your own long holds support, contradict, or remain agnostic about the Trika's metaphysical claim that what vibrates is citi?",
    "module_reference": "Module D, Week 9"
  },

  "S1-W10-READ-ytt-manual-section-9-somatic-experiencin": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 9 — Somatic Experiencing, ANS, Identity, Separation, Inner Critic",
    "why": "Section 9 is the most clinical section of the YTT manual and the most philosophically loaded: somatic experiencing (Peter Levine's framework), the inner critic as an internalized voice, and identity as something that can be 'separated' from the traumatic response. The reification of the inner critic as a distinct entity is the clearest place where popular somatic language imports a self-structure — there is a 'you' and there is the inner critic, and the therapeutic goal is to establish the 'you' as the stable witness that can observe the critic without being overwhelmed. Apply Module C Week 10 (AKBh anuśaya as causal tendency rather than stored object): if the inner critic is an anuśaya — a latent causal disposition — rather than a stored object, then the therapeutic goal is not to establish a witness-self but to remove the conditions under which the pattern activates. These are different clinical models with different implications for how you teach.",
    "module_reference": "Module D, Week 10"
  },

  "S1-W10-READ-satchidananda-ys-21217-klesas-samskaras-": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 2: 2.1–2.17 (kleśas — the five afflictions; saṃskāras as the deep impressions that sustain them); 2.33–2.34 (pratipakṣa bhāvanā — cultivating the opposite)",
    "why": "The kleśa-saṃskāra model is Patañjali's account of how suffering perpetuates itself: the five kleśas (avidyā, asmitā, rāga, dveṣa, abhiniveśa) leave saṃskāras — deep impressions in the citta — that predispose the mind to generate the same afflictions again. The saṃskāra concept is structurally very close to the AKBh's anuśaya: both describe a latent causal pattern rather than a stored object. The key difference: Patañjali's saṃskāras are impressions in a citta that itself has no intrinsic nature in Madhyamaka analysis — which means the 'impressions' are also dependently conditioned events, not stored objects in a container-self. Pratipakṣa bhāvanā (2.33–2.34) — cultivating the opposite thought — is the classical cognitive substitution technique. Apply MMK Ch. 24: if kleśas arise dependently (from seed + object + absence of antidote), then pratipakṣa bhāvanā works by providing the antidote condition — not by introducing a new substance but by altering the causal configuration.",
    "module_reference": "Module D, Week 10"
  },

  "S1-W10-READ-iyengar-loy-pranayama-chapter-psychologi": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Prāṇāyāma chapter — psychological effects sections; descriptions of kumbhaka (retention) and its claimed effects on the mind",
    "why": "Iyengar's prāṇāyāma chapter makes the most explicit psychological claims in the book: specific techniques are said to produce specific mental states (nāḍī śoddhana calms, bhastrikā invigorates, kumbhaka suspends ordinary mental activity). The kumbhaka descriptions are philosophically rich: retention is described as the state where the practitioner 'exists as pure Ātman.' This is the prāṇāyāma equivalent of Patañjali's nirbīja samādhi — ordinary mental activity ceases and what remains is the witness-self. Apply Week 10's trauma-sensitive framing: breath-retention is a documented trigger for sympathetic nervous system activation in trauma survivors. The claim that kumbhaka produces a state of 'pure Ātman' is not merely metaphysically contested but clinically significant — it can override the very ANS self-regulation the trauma-sensitive framework is trying to support.",
    "module_reference": "Module D, Week 10"
  },

  "S1-W10-READ-d-integration-anand-neuroscience-of-yoga": {
    "source": "Neuroscience of Yoga, Part 1",
    "author": "Anand (check Module D materials for full citation)",
    "passage": "Trauma-relevant chapters — vagal tone, HPA-axis dysregulation, documented PTSD research findings",
    "why": "The re-read of Anand's neuroscience material for Week 10 focuses specifically on the trauma-relevant chapters — what the research actually says about yoga's effect on PTSD, HPA-axis dysregulation, and vagal tone. This is the empirical grounding for Week 10's WRITE assignment on trauma as conditioned pattern rather than stored object. Key findings to hold: the nervous system changes that trauma produces are real, measurable, and reproducible — which means the 'stored in the body' language is tracking something real even if it is philosophically imprecise. The question your WRITE assignment asks is not whether something real happens but whether the 'stored object' model or the 'conditioned tendency' model gives a better account of it. Anand's data is compatible with both — identifying which model makes better predictions is your contribution.",
    "module_reference": "Module D, Week 10 (D-integration)"
  },

  "S1-W10-LISTEN-capriles-the-four-noble-truths-of-ecolog": {
    "speaker": "Capriles (check Module D materials for full name and talk title)",
    "talk_title": "The Four Noble Truths of Ecology (check Module D materials for exact title and source)",
    "source": "Check Module D materials for recording/lecture link",
    "why": "Capriles extends the Four Noble Truths into an ecological frame: duḥkha as the suffering of ecological systems (not merely individual organisms), samudaya as the conditions of that suffering, nirodha as the possibility of ecological health, and mārga as the path — a politics and ethics of non-reification applied to the more-than-human world. This talk is the most direct bridge between Week 10's MMK Ch. 24 (the prapañcopaśama verse's account of dependent origination as the middle way) and the applied ethics dimension of your capstone. The key convergence with MMK 24.18: if entities lack svabhāva, then the ecological crises that arise from treating organisms as having intrinsic use-value (instrumental reason) are structurally identical to the kleśas that arise from treating persons as having intrinsic self-nature. Non-reification is not just a meditation instruction; it is an ecological ethics.",
    "module_reference": "Module D, Week 10 (D-integration)"
  },

  "S1-W10-LISTEN-if-pacing-wont-accommodate-both-split-ca": {
    "source": "Scheduling note — not a primary reading item",
    "why": "This is a curriculum design note: if pacing does not accommodate both the Capriles talk and other Week 10 material, split the Capriles talk across Weeks 10 and 12 rather than dropping it. The MMK 24 + Capriles ecological convergence is structurally important for the capstone's applied ethics section.",

  "S1-W11-READ-ytt-manual-section-10-adaptive-populatio": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 10 — Adaptive Populations, Modification, Inclusion, Chair Yoga",
    "why": "Section 10 frames adaptive yoga as modifications of a standard practice for non-standard populations. Read it against Week 11's WRITE assignment: what is the 'standard practice' from which these modifications deviate? The implicit normative body is usually young, able-bodied, female-presenting, flexible — which means the standard practice is already adapted for one particular population even if that adaptation is invisible. The Section 10 modifications become visible as adaptations; the original practice remains invisible as the default. The philosophical work of Week 11 is to make the default visible and question whether it should remain the default. Chair yoga is the most radical example in the manual: when the floor is no longer the practice surface, what of the 'practice' remains? Apply Module C's rūpa-skandha analysis: the practice is not stored in any particular configuration of the body but arises dependently in the meeting of instruction and present capacity.",
    "module_reference": "Module D, Week 11"
  },

  "S1-W11-READ-ytt-manual-section-11-business-of-yoga-f": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 11 — Business of Yoga (full read this week; business ethics, marketing, studio management, pricing, aparigraha in professional context)",
    "why": "Section 11 is where the curriculum confronts the economic conditions of contemporary yoga teaching. Read it alongside Week 11's WRITE assignment on the brand question and aparigraha. The manual's business-of-yoga framing tends to treat the economic dimension as a practical layer added on top of the practice — marketing as a necessary evil. The philosophical work is to see the economic logic as itself a practice-shaping condition, not a neutral container. Every marketing choice encodes a claim about what yoga is and who it is for. Aparigraha (non-possessiveness) applied to one's yoga brand: the identity investment in being 'the authentic teacher' or 'the rigorous tradition' is itself an object of grasping. What would a business model built on aparigraha actually look like? Section 11 provides the concrete material that Week 11's WRITE assignment needs.",
    "module_reference": "Module D, Week 11"
  },

  "S1-W11-READ-satchidananda-ys-120122-three-levels-of-": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 1: 1.20–1.22 (three levels of intensity in practice — mild, medium, intense); Book 2: 2.30–2.39 revisited (yamas, with particular attention to aparigraha)",
    "why": "Sūtras 1.20–1.22 introduce the intensity-of-practice variable: faith, energy, memory, samādhi, and discernment can each be mild, medium, or intense, with intense practice yielding quicker results. The intensity teaching raises the normative-body question immediately: what counts as intense for a practitioner with chronic pain? With a neurological condition? With a history of trauma? The adaptive yoga context of Week 11 makes the intensity-of-practice variable into an equity question: if the path to liberation presupposes a body capable of intense practice, is it a universal path? Aparigraha revisited for Week 11: the business context makes aparigraha concrete — what are you holding onto in your teaching persona, and what would releasing it cost you professionally?",
    "module_reference": "Module D, Week 11"
  },

  "S1-W11-READ-iyengar-loy-prop-system-sections-preface": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "edition": "Schocken Books, 1966 (current: HarperCollins)",
    "passage": "Prop-system sections (scattered throughout the āsana descriptions); the Preface (Iyengar's account of his relationship with Krishnamacharya)",
    "why": "Iyengar's prop system is, paradoxically, both adaptive and normative: props are described as tools for achieving 'the correct position' for practitioners whose bodies cannot achieve it unassisted — which still presupposes the correct position as the target. For Week 11: read the prop descriptions for the model of the body embedded in each prop prescription. The preface on Krishnamacharya is philosophically important for a different reason: it reveals Iyengar's account of transmission — what he received from his teacher, how the practice passed through the student-teacher relationship. This is the Iyengar tradition's answer to the aural lineage question: transmission by demonstration and correction rather than by pointing-out instruction. Both are real forms of transmission; they presuppose different accounts of what is being transmitted.",
    "module_reference": "Module D, Week 11"
  },

  "S1-W11-READ-ksemaraja-pratyabhijnahrdayam-sutra-19-r": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 19 (revisit): samāveśa — this time read for the three-fold upāya (means) structure: āṇavopāya (individual means), śāktopāya (energy means), śāmbhavopāya (Śiva means)",
    "why": "The second reading of sūtra 19 activates the upāya structure that Kṣemarāja introduces in the commentary: the three means of recognition correspond to three levels of the practitioner's capacity. Āṇavopāya uses the body, breath, and action as means (the yoga-teacher's primary toolkit). Śāktopāya uses mantra, visualization, and awareness-as-medium. Śāmbhavopāya requires no means — recognition occurs in the practitioner of highest capacity through the teacher's intent alone. For the adaptive yoga and business contexts of Week 11: this upāya hierarchy is Trika's most practical contribution to pedagogy. Different students require different means; the teacher who can only work at the āṇavopāya level (physical adjustment, verbal instruction, sequencing) is limited relative to one who can also work at śāktopāya (energetic transmission) or śāmbhavopāya (presence-based pointing-out). The business implication: the teacher's capacity cannot be marketed directly, which is why authentic transmission and commercial yoga teaching are in structural tension.",
    "module_reference": "Module D, Week 11"
  },

  "S1-W11-LISTEN-lifshitzveissiere-pt-3": {
    "speaker": "Lifshitz & Veissière",
    "talk_title": "Cultural Neurophenomenology, Part 3 (check Module D materials for exact title and source)",
    "source": "Check Module D materials for recording/lecture link",
    "why": "Part 3 continues the cultural neurophenomenology argument into its most applied dimension — how specific cultural practices (including yoga lineages) shape the practitioner's phenomenology at a neural level that persists after the practice ends. For Week 11's adaptive yoga context: the cultural shaping of embodiment is not uniform across populations. A student whose body has been shaped by chronic illness, disability, or marginalization has a different culturally-inscribed phenomenology than the normative practitioner the YTT curriculum implicitly addresses. Part 3's most useful concept for your teaching: the 'cultural scaffolding' that makes certain experiences possible — and how teachers who are unaware of that scaffolding can inadvertently make those experiences unavailable to students whose scaffold is different.",
    "module_reference": "Module D, Week 11 (D-integration)"
  },

  "S1-W11-READ-d-integration-nicholson-buddhism-cogniti": {
    "source": "Buddhism, Cognitive Science, and the Doctrine of Selflessness",
    "author": "Nicholson (check Module D materials for full citation)",
    "passage": "Selective for studio-translation language — chapters on translating anātman for secular or non-Buddhist practitioners",
    "why": "Nicholson's work sits at the intersection of Buddhist philosophy and cognitive science, and is included here specifically for its vocabulary of translation: how does one present the anātman doctrine to practitioners who are not invested in Buddhist metaphysics? For your YTT: this is the applied linguistics problem your capstone must solve. The concepts from Module C (anuśaya, kleśa, dharma-stream) and Module B (svabhāva, dependent origination, pudgalanairātmya) have technical precision that is pedagogically valuable but not directly usable in a studio context. Nicholson's secular-translation strategies give you a tested vocabulary for the same concepts without the Buddhist jargon — read selectively for the translation moves, not for comprehensive coverage.",
    "module_reference": "Module D, Week 11 (D-integration)"
  },

  "S1-W11-READ-d-integration-norbu-teachers-training-fu": {
    "source": "Teachers' Training",
    "author": "Chögyal Namkhai Norbu",
    "edition": "Check Module D materials for edition",
    "passage": "Opening chapters on authentic teacher qualities and the relational discipline of transmission",
    "why": "Norbu's account of authentic teacher qualities — as distinct from technically proficient teacher qualities — is the most direct engagement with the capstone's central pedagogical question. What makes a teacher authentic in Norbu's Dzogchen framework: not credentials, lineage certificates, or technical mastery, but the degree to which one's own recognition of the natural state informs one's teaching presence. The relational discipline of transmission is the practical implication: the teacher-student relationship is not a service transaction but a karmic connection that requires the teacher to be continuously in practice, not merely to have completed training. For Week 11's business-of-yoga context: this places Norbu's framework in direct tension with the commercial yoga model, where certification is the marker of qualification. That tension is worth articulating explicitly in your Week 11 WRITE assignment.",
    "module_reference": "Module D, Week 11 (D-integration)"
  },

  "S1-W11-READ-d-integration-tien-feng-lee-buddhist-eth": {
    "source": "Buddhist Ethics for Laypeople",
    "author": "Tien-Feng Lee (check Module D materials for full citation)",
    "passage": "Chapters on right speech and right livelihood",
    "why": "Tien-Feng Lee's treatment of right speech and right livelihood is the most practically applicable Buddhist ethical material in the entire Module D curriculum. Right speech (sammā vācā) is relevant to every cue you give in a yoga class: is the language true, necessary, kind, and timely? The AKBh's four verbal paths of action (lying, divisive speech, harsh speech, idle chatter) provide the negative taxonomy; right speech provides the positive. Right livelihood for a yoga teacher: earning income through teaching is not automatically right livelihood — it depends on whether the activity supports or hinders students' liberation from suffering. Read Lee's treatment of these categories not as rules but as investigative tools for auditing your current practice.",
    "module_reference": "Module D, Week 11 (D-integration)"
  },

  "S1-W12-READ-ksemaraja-ph-sutras-14-and-12-counterpoi": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtras 1–4 (re-read) and Sūtra 12 with commentary (Singh pp. 47–65 and 83–86): sūtra 12 on the bliss of citi and the condition of bondage",
    "why": "Week 12's re-read of sūtras 1–4 is the T1/T2 tension anchor from the Trika side: after ten weeks of Madhyamaka, Abhidharma, and Dzogchen engagement, return to sūtra 1's most direct claim — 'citi is the cause of the siddhi of the universe' — and assess what you actually think now. Has Module B's svabhāva analysis dissolved the claim? Has Module A's gzhi teaching reframed it? Sūtra 12 adds the bondage analysis: 'being covered by the maya power, the state of the saṃsārin is one of bondage.' The bondage-and-liberation framework of the Trika is here at its most explicit: bondage is real (not a dependent designation), caused by māyā, and lifted by grace. This is the most direct point of philosophical divergence between the Trika and Madhyamaka in the entire PH text — and it is the Week 12 T3 (prapañca/māyā) anchor for the tensions document.",

  "S1-W12-READ-module-d-appendix-b-central-philosophica": {

  "S1-W12-READ-re-read-your-week-1-week-4-week-7-writte": {

  "S1-W12-READ-vasubandhu-akbh-ix-selections-on-the-ref": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 4 (Chapter 9 only)",
    "passage": "AKBh Ch. 9 (Pudgalapratiṣedhaprakaraṇa) — selected verses on the refutation of the pudgala (person): the fire-and-fuel simile extended to the person-and-aggregates relation; the Vātsīputrīya interlocutor's position",

  "S1-W12-LISTEN-berkovich-ohana-re-listen-on-self-patter": {

  "S1-W12-LISTEN-capriles-re-listen-on-the-saksin-critiqu": {
    "speaker": "Capriles",
    "talk_title": "Re-listen on the sākṣin critique (check Module D materials for exact title)",
    "source": "Check Module D materials for recording/lecture link",
    "why": "The Capriles re-listen focuses specifically on the sākṣin (witness-self) critique — his argument that the witness-awareness posited by Vedānta and much popular yoga teaching is not pure awareness but a subtle form of self-grasping. This is one of the most direct critiques of T1 in the entire semester's material. Listen with Module B Week 8's Ch. 18 (MMK examination of the self) active: Capriles and Nāgārjuna arrive at structurally similar conclusions from different starting points. Also hold Module A Week 8's gzhi/sems distinction: the Dzogchen account of what is present in deep meditation (ye shes — pristine consciousness) is not the sākṣin. What is the difference between Dzogchen's 'awareness without center' and Capriles's critique of the sākṣin? Does the distinction hold, or does Capriles's argument also apply to the Dzogchen account of recognition?",

  "S1-W13-READ-norbu-teachers-training-sections-on-view": {
    "source": "Teachers' Training",
    "author": "Chögyal Namkhai Norbu",
    "edition": "Check Module D materials for edition",
    "passage": "Sections on view, conduct, and speech — the tripartite audit framework for the practitioner-teacher",
    "why": "Norbu's tripartite framework (view / conduct / speech) is the most useful practical schema in the entire Module D curriculum for auditing one's teaching. View is what you actually believe (not what you profess) about the nature of mind, suffering, and liberation. Conduct is what your actions embody — the lived expression of view under pressure. Speech is how view and conduct manifest in what you say to students. The Week 13 WRITE assignment (cue-log audit) is fundamentally an audit of speech against view: do your cues actually embody the view you hold, or is there a gap? Norbu's framing is that the gap between view and conduct (and by extension speech) is not a personal failing but an indicator of the practitioner's degree of integration. The audit is a diagnostic, not a verdict.",
    "module_reference": "Module D, Week 13"
  },

  "S1-W13-READ-your-cue-log-fourteen-weeks-of-entries-c": {
