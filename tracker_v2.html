<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTT Curriculum — Thigle Map</title>
<style>
/* ── reset & base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ── design tokens ────────────────────────────────────────── */
:root {
  --bg:           #0c0d12;
  --surface:      #14151c;
  --surface-2:    #1b1c26;
  --surface-3:    #22232f;
  --border:       rgba(255,255,255,0.07);
  --border-mid:   rgba(255,255,255,0.12);
  --text:         #e4e2f2;
  --text-muted:   #8f8da8;
  --text-dim:     #4e4d63;

  /* state colours — dark mode primary */
  --c-complete:        #5DCAA5;
  --c-complete-fill:   #1d9e7533;
  --c-complete-text:   #9FE1CB;
  --c-active:          #AFA9EC;
  --c-active-fill:     #7f77dd22;
  --c-active-text:     #CECBF6;
  --c-heavy:           #F09595;
  --c-heavy-fill:      #e24b4a18;
  --c-heavy-text:      #F7C1C1;
  --c-integration:     #AFA9EC;
  --c-upcoming:        #44435a;
  --c-upcoming-text:   #8f8da8;

  /* tension thread colours */
  --t1: #AFA9EC;
  --t2: #5DCAA5;
  --t3: #F09595;
  --t4: #ED93B1;

  --panel-w:    292px;
  --topbar-h:   72px;
  --legend-h:   52px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:           #f5f4f8;
    --surface:      #ffffff;
    --surface-2:    #f0eff6;
    --surface-3:    #e8e7f0;
    --border:       rgba(0,0,0,0.07);
    --border-mid:   rgba(0,0,0,0.12);
    --text:         #1e1c2e;
    --text-muted:   #6e6c88;
    --text-dim:     #b0aec8;
    --c-complete:        #0F6E56;
    --c-complete-fill:   #1d9e7518;
    --c-complete-text:   #0F6E56;
    --c-active:          #7F77DD;
    --c-active-fill:     #7f77dd14;
    --c-active-text:     #3C3489;
    --c-heavy:           #E24B4A;
    --c-heavy-fill:      #e24b4a12;
    --c-heavy-text:      #A32D2D;
    --c-integration:     #7F77DD;
    --c-upcoming:        #c8c7d6;
    --c-upcoming-text:   #888780;
    --t1: #7F77DD;
    --t2: #1D9E75;
    --t3: #E24B4A;
    --t4: #D4537E;
  }
}

/* ── layout ───────────────────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

#app { display: flex; flex-direction: column; height: 100%; }

/* ── top bar ──────────────────────────────────────────────── */
#top-bar {
  height: var(--topbar-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.topbar-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 28px;
}
.topbar-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.stat-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.stat-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

#btn-export {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-mid);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
#btn-export:hover { background: var(--surface-3); border-color: var(--c-active); }
#btn-export svg { opacity: 0.7; }

/* ── main content area ────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── thigle container ─────────────────────────────────────── */
#thigle-container {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 8px 8px 12px;
  overflow: hidden;
}

#thigle-svg {
  width: 100%;
  height: 100%;
  max-width: min(calc(100vh - var(--topbar-h) - var(--legend-h) - 24px), 100%);
  max-height: calc(100vh - var(--topbar-h) - var(--legend-h) - 24px);
  aspect-ratio: 1;
  overflow: visible;
}

/* ── side panel ───────────────────────────────────────────── */
#side-panel {
  width: var(--panel-w);
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--surface);
  padding: 20px 18px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* summary panel */
.summary-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.summary-stat:last-child { border-bottom: none; }
.summary-stat-label { color: var(--text-muted); font-size: 13px; }
.summary-stat-value { font-weight: 600; font-size: 13px; }

/* week panel */
.panel-week-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.panel-week-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.panel-progress-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--surface-3);
  margin-bottom: 16px;
  overflow: hidden;
}
.panel-progress-fill {
  height: 100%;
  background: var(--c-active);
  border-radius: 2px;
  transition: width 0.3s;
}

.item-list { display: flex; flex-direction: column; gap: 6px; }
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  font-size: 13px;
  line-height: 1.4;
  cursor: pointer;
  border-radius: 6px;
  padding: 4px 6px;
  transition: background 0.12s;
}
.item-row:hover { background: var(--surface-2); }
.item-icon { flex-shrink: 0; width: 16px; height: 16px; margin-top: 1px; }
.item-label { color: var(--text); }
.item-label.done {
  text-decoration: line-through;
  color: var(--text-dim);
}
.item-type-badge {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--surface-3);
  color: var(--text-muted);
  flex-shrink: 0;
  align-self: center;
}

.tensions-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 4px;
}
.tension-chip {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid;
  cursor: pointer;
  transition: opacity 0.15s;
}
.tension-chip:hover { opacity: 0.75; }

/* ── legend ───────────────────────────────────────────────── */
#legend {
  height: var(--legend-h);
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  gap: 20px;
  overflow: hidden;
}

.legend-items {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--text-muted);
  white-space: nowrap;
}
.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-dash {
  width: 20px;
  height: 2px;
  background: var(--text-dim);
  border-radius: 1px;
  flex-shrink: 0;
  border-top: 2px dashed var(--text-muted);
  background: none;
}
.legend-tensions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.legend-tension {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}
.legend-tension span {
  font-weight: 600;
  margin-right: 3px;
}

/* ── SVG node hover styles (applied via JS class) ─────────── */
.week-node { cursor: pointer; }
.week-node:hover .node-ring { filter: brightness(1.25); }
.week-node.selected .node-ring { filter: none; }
.satellite { cursor: pointer; }
.satellite:hover circle { filter: brightness(1.4); }

/* ── Sync badge ───────────────────────────────────────────── */
#sync-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border-mid);
  background: var(--surface-2);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  user-select: none;
}
.sync-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
#sync-badge.sync-ok    .sync-dot { background: var(--c-complete); }
#sync-badge.sync-saving .sync-dot { background: var(--c-active); animation: sync-pulse 0.8s infinite; }
#sync-badge.sync-local  .sync-dot { background: var(--text-dim); }
@keyframes sync-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Info button on item rows ─────────────────────────────── */
.item-info-btn {
  flex-shrink: 0;
  align-self: center;
  margin-left: auto;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid var(--border-mid);
  background: transparent;
  color: var(--c-active);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, border-color 0.12s;
}
.item-info-btn:hover { background: var(--c-active-fill); border-color: var(--c-active); }
.item-info-btn--empty { color: var(--text-dim); border-color: var(--border); }
.item-info-btn--empty:hover { background: var(--surface-3); border-color: var(--border-mid); color: var(--text-muted); }

/* ── Detail modal ─────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }

.modal-card {
  background: var(--surface);
  border: 1px solid var(--border-mid);
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.55);
  width: 100%;
  max-width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.modal-close {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.modal-close:hover { background: var(--surface-3); color: var(--text); }
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.modal-meta-table { display: flex; flex-direction: column; gap: 7px; }
.modal-meta-row { display: flex; gap: 10px; font-size: 13px; line-height: 1.4; }
.modal-meta-key {
  flex-shrink: 0;
  width: 88px;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding-top: 1px;
}
.modal-meta-val { color: var(--text); }
.modal-why-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.modal-why-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text);
}
.modal-xrefs { display: flex; flex-wrap: wrap; gap: 6px; }
.modal-xref-chip {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
}
.modal-xref-chip:hover { background: var(--c-active-fill); border-color: var(--c-active); color: var(--c-active-text); }
.modal-empty { font-size: 13px; color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <header id="top-bar">
    <div class="topbar-left">
      <span class="topbar-eyebrow">Semester 1 thigle</span>
      <span class="topbar-title">YTT integration</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-stat">
        <span class="stat-label">Progress</span>
        <span class="stat-value" id="stat-progress">0%</span>
      </div>
      <div class="topbar-stat">
        <span class="stat-label">Streak</span>
        <span class="stat-value" id="stat-streak">0 days</span>
      </div>
      <button id="btn-export" title="Export state to JSON">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M7 1v8M4 6l3 3 3-3"/>
          <path d="M2 10v2h10v-2"/>
        </svg>
        Export
      </button>
      <div id="sync-badge" class="sync-local" title="Sync status">
        <div class="sync-dot"></div>
        <span id="sync-label">Local</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main id="main">
    <div id="thigle-container">
      <svg id="thigle-svg" viewBox="0 0 540 540"
           xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="YTT curriculum thigle map">
        <!-- Populated by renderThigle() -->
      </svg>
    </div>

    <aside id="side-panel" aria-label="Week details">
      <!-- Populated by renderPanel() -->
    </aside>
  </main>

  <!-- Detail modal -->
  <div id="detail-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modal-title-text" class="modal-title"></span>
        <button id="modal-close" class="modal-close" title="Close (Esc)">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Legend -->
  <footer id="legend">
    <div class="legend-items">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--c-complete);"></div>
        Complete
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border:2px solid var(--c-active);"></div>
        Active
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border:2px solid var(--c-upcoming);"></div>
        Upcoming
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border:2px solid var(--c-heavy);"></div>
        Heavy week
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border:2px dashed var(--c-integration);"></div>
        Integration
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--c-heavy);opacity:0.8;"></div>
        Record
      </div>
      <div class="legend-item">
        <div class="legend-dash"></div>
        Tension chord
      </div>
    </div>
    <div class="legend-tensions">
      <div class="legend-tension"><span style="color:var(--t1)">T1</span> ātman / anātman</div>
      <div class="legend-tension"><span style="color:var(--t2)">T2</span> svāsaṃvedana</div>
      <div class="legend-tension"><span style="color:var(--t3)">T3</span> prapañca / māyā</div>
      <div class="legend-tension"><span style="color:var(--t4)">T4</span> gzhi vs. ground</div>
    </div>
  </footer>

</div>

    "passage": "Root verses I.5–15 revisited (five skandhas formally defined); I.40–47 (three unconditioned dharmas — ākāśa, pratisaṃkhyā-nirodha, apratisaṃkhyā-nirodha; conditioned characteristics saṃskṛta-lakṣaṇa)",
    "why": "Five upādāna-skandhas as 'addictive aggregates' — Malcolm's key teaching: you are helplessly addicted to rebirth. Three unconditioned dharmas: unobstructed space; analytical cessation (path-result); non-analytical cessation (simple absence of cause). Saṃskṛta-lakṣaṇa: the four conditioned characteristics apply to every conditioned phenomenon including their own characteristics. Shaiva interlocutor: PH sūtra 20 (Singh p. 110) names Trika liberation as pūrṇo'haṁtā — 'perfect I-ness' in essence as cit and ānanda. The AKBh's account of freedom is precisely the opposite shape: freedom (nirodha) is simply an absence, not a positive state of bliss-identity. Hold this contrast without softening it — it is itself a meditation.",
    "module_reference": "Module C, Week 3 / Module D, Week 3",
    "cross_refs": ["S1-W3-LISTEN-malcolm-akbh-s1c2"]
  },
  "S1-W3-READ-module-a-wk-3-smith-yns-short-aural-line": {
    "source": "Yoga of the Natural State: The Dzogchen Aural Lineage",
    "author": "Longchenpa / trans. Ācārya Malcolm Smith",
    "edition": "Wisdom Publications, 2025",
    "passage": "Self-Appearing Pristine Consciousness: The Short Aural Lineage — opening verse through Section 2.1.7 (The Yoga of the Natural State), approximately pp. 33–38",
    "why": "Memorize the seven preliminary practices: (1) Guru Yoga, (2) Maṇḍala Yoga, (3) Vajrasattva, (4) Yoga of Impermanence, (5) Yoga of the Suffering of Saṃsāra, (6) Yoga of Bodhicitta, (7) Yoga of the Natural State. Why does the natural state investigation come last? What has been prepared by the six prior practices? The seventh yoga's classical fourfold analysis — Where does mind arise from? What is its producing agent? Where does it dwell? Where does it depart? — is structurally identical to Vasubandhu's AKBh analysis of momentary dharmas. But the purpose is diametrically opposed: not to catalogue the dharmas of experience but to dissolve any referent for the investigator. For your YTT: Shaiva Tantra's preliminaries orient toward the recognition of Śiva-consciousness as one's own nature (a universal self-recognition). Dzogchen's seventh yoga points toward the recognition that the investigator itself cannot be found — there is no ātman, universal or individual, to recover.",
    "module_reference": "Module A, Week 3 / Module D, Week 3"
  },
  "S1-W3-READ-d-integration-tenzin-wangyal-healing-wit": {

  "S1-W3-LISTEN-leick-the-way-to-understand-nature-and-o": {

  "S1-W4-READ-ytt-manual-section-3-states-of-conscious": {
    "source": "YTT Manual (My Vinyasa Practice, 300-hr)",
    "passage": "Section 3 — States of Consciousness, Turīya, Saṅkalpa, Self as Witness, iRest",
    "why": "The YTT presents four states of consciousness (waking/jāgrat, dream/svapna, deep sleep/suṣupti, enlightenment/turīya) and positions Yoga Nidra as a practice that cultivates the alpha-state, over time leading to turīya — 'Pure Awareness.' The manual states directly: 'Awareness is the boundless, formless, and timeless Ātman within us all. It has no beginning or end. It is indestructible. This awareness is the Self that we long to know.' iRest operationalizes the saṅkalpa as an intentional seed planted in awareness: the witness-self is the infrastructure this protocol requires. The key structural question to hold through this week's readings: if turīya is described as 'pure witness,' what does that commit us to ontologically? Compare with Kṣemarāja's sūtra 18 (Shaiva counterpoint), Patañjali's nirbīja samādhi ambiguity, and Dzogchen's rang rig analysis — three different accounts of what remains when ordinary mental activity subsides.",
    "module_reference": "Module D, Week 4"
  },
  "S1-W4-READ-satchidananda-ys-117151-samadhi-stages-t": {
    "source": "Yoga Sūtras of Patañjali",
    "author": "Patañjali",
    "translator": "Swami Satchidananda",
    "edition": "Integral Yoga Publications, 1978",
    "passage": "Book 1: 1.17–1.51 (the stages of samādhi — savitarka through nirbīja; the 'seedless' samādhi); Book 3 (Vibhūti Pāda): 3.1–3.11 (dhāraṇā, dhyāna, samādhi and their relationship to the states of consciousness)",
    "why": "Satchidananda treats the witness (sākṣin) as the eternal Self, unchanging through all four states. In nirbīja samādhi (seedless, objectless samādhi — Sūtra 1.51), even the seed of self-concept is extinguished. What remains? Satchidananda says Puruṣa. The philosophically generative ambiguity: is Puruṣa a positive Self that remains, or is this the cessation of grasping at a self? Module D Week 4 holds these sūtras directly against AKBh Ch. 2 (citta/mental factors) on exactly this question: which mental factors are present in yoga nidrā states?",
    "module_reference": "Module D, Week 4",
    "cross_refs": ["S1-W4-READ-module-c-wk-4-akbh-ch-2-samskara-citta-m", "S1-W4-READ-module-a-wk-4-smith-yns-short-aural-line"]
  },
  "S1-W4-READ-iyengar-loy-pranayama-intro-technique-se": {
    "source": "Light on Yoga",
    "author": "B.K.S. Iyengar",
    "passage": "Prāṇāyāma chapter: Introduction and technique sections; kumbhaka (retention) and its relationship to states of consciousness",
    "why": "Iyengar treats prāṇāyāma as a bridge from the gross to the subtle — from physical breath-control to awareness of prāṇa to the witness of both. Track his language of 'the soul' as the ultimate beneficiary and witness of prāṇāyāma. The technique descriptions carry implicit assumptions about control, interiority, and the relationship between effort and surrender. Read as a phenomenology of attentional redirection — this preserves what's pedagogically valuable for teaching while bracketing the metaphysical claim about the soul that witnesses.",
    "module_reference": "Module D, Week 4"
  },
  "S1-W4-READ-module-b-wk-4-mmk-ch-69-relational-ident": {
    "source": "Mūlamadhyamakakārikā; Vigrahavyāvartanī (full text)",
    "author": "Nāgārjuna",
    "translator": "Siderits & Katsura (MMK, Wisdom 2013); Westerhoff (VV, Oxford 2010, pp. 30–100)",
    "passage": "MMK Ch. 6 'Desire and the One Who Desires,' Ch. 7 'The Conditioned,' Ch. 8 'Object and Agent,' Ch. 9 'What Is Prior,' Ch. 10 'Fire and Fuel' (pp. 75–130); VV translation of root verses with Westerhoff's commentary (full text)",
    "why": "These chapters constitute Nāgārjuna's sustained analysis of relational identity. Chapter 10's fire-fuel analysis is among the most elegant: fire and fuel cannot be identical (fire would burn itself) nor entirely distinct (fire without fuel is nothing). The relationship has no intrinsic nature; it is dependently constituted. This logic directly parallels the Shaiva Tantra teaching on Śiva and Śakti — but with a crucial divergence: for Nāgārjuna, the relational constitution produces śūnyatā, not a higher-order substance. PH sūtra 4 (Singh p. 60): 'The individual [experient], in whom citi or consciousness is contracted, has the universe [as his body] in a contracted form.' The contracted experient is neither identical with citi nor entirely different — how does Nāgārjuna's fire-fuel logic apply to this Śiva-Śakti relation?",
    "module_reference": "Module B, Week 4 / Module D, Week 4",
    "cross_refs": ["S1-W4-READ-ksemaraja-pratyabhijnahrdayam-sutra-18-t", "S1-W3-READ-satchidananda-ys-2129-kriya-yoga-klesas-"]
  },
  "S1-W4-READ-module-c-wk-4-akbh-ch-2-samskara-citta-m": {
    "source": "Abhidharmakośabhāṣyam",
    "author": "Vasubandhu",
    "translator": "Gelong Lodrö Sangpo",
    "edition": "Motilal Banarsidass, 2012, Vol. 1 (Malcolm: Series I, Class 3, Parts 1–2)",
    "passage": "Root verses II.1–14 with commentary: the 22 indriyas — five sense faculties through the three pure faculties (ajñātamājñāsyāmīndriya, ājñendriya, ājñātāvindriya); commentary on II.8–14 (the five mental faculties: faith, energy, mindfulness, samādhi, discernment)",
    "why": "22 indriyas: 14 that keep us in saṃsāra (six senses + gender + life-faculty + five sensations) vs. 8 that support liberation. The five liberating faculties — faith (śraddhā), energy (vīrya), mindfulness (smṛti), samādhi, prajñā — are the path dharmas of Abhidharma practice. Malcolm's key teaching: samādhi is an omnipresent mental factor — everything we do is already samādhi; the question is only its object. Shaiva interlocutor: PH sūtra 7's commentary (Singh p. 73) frames the indriyas as features of contracted citi at the level of the pramātṛ (experient). In AKBh, the indriya is a dharma — an ontological primitive. In Trika, the indriya is a contraction of a prior unitary consciousness. Where you locate the indriyas ontologically determines whether you implicitly teach a Self that has senses or a process of sensing without a senser.",
    "module_reference": "Module C, Week 4 / Module D, Week 4",
    "cross_refs": ["S1-W4-READ-satchidananda-ys-117151-samadhi-stages-t", "S1-W4-LISTEN-malcolm-akbh-s1c3"]
  },
  "S1-W4-READ-module-a-wk-4-smith-yns-short-aural-line": {

    "why": "The two-part structure of the direct introduction: (a) introducing self-abiding consciousness (rang bzhin gnas pa'i shes pa) as unfabricated; (b) introducing self-arising consciousness (rang shar gyi shes pa) as great self-liberation. Three examples, five natures, four signs of heat for each introduction. Memorize: 'dwell in that state, maintain it with mindfulness, do not be moved by concepts, eliminate hope and fear, and annul lethargy or agitation' — the five key points of trekchö. Technical: the four signs of heat include 'Since concepts do not harm the stilled mind, conceptuality and nonconceptuality are the same' — compare with VV: the absence of inherent existence in phenomena does not require abandoning their appearance.",

  },
  "S1-W4-READ-ksemaraja-pratyabhijnahrdayam-sutra-18-t": {
    "source": "Pratyabhijñāhṛdayam (The Doctrine of Recognition)",
    "author": "Kṣemarāja",
    "translator": "Jaideva Singh",
    "edition": "Motilal Banarsidass, 1963 / SUNY Press, 1990",
    "passage": "Sūtra 18 with commentary (turīya and turyātīta — the strongest defense of the witness-self in the semester)",
    "why": "This is the single most direct point of confrontation between the Trika and Buddhist accounts of yoga nidrā phenomenology. Kṣemarāja's commentary on the four states (jāgrat, svapna, suṣupti, turīya) and the fifth state (turyātīta, 'beyond the fourth'): turīya is not merely a fourth state above the three ordinary states but the ground-consciousness pervading all three. Turyātīta is the state where the witness dissolves into the undivided stream of citi-śakti. Compare: the Buddhist anātman account — nirbīja samādhi extinguishes even the seed of self-concept; Dzogchen's rang rig as awareness without a center recognizing its own nature (not a Self knowing itself); Module C Week 3 (AKBh unconditioned dharmas) where analytical cessation is simply an absence, not a positive state of bliss-identity. Read sūtra 18 carefully — Kṣemarāja's position is more philosophically robust than the YTT's kosha-Ātman identification, but raises the same fundamental problem from a Mādhyamika perspective.",

  },
  "S1-W4-READ-d-integration-satyananda-yoga-nidra-intr": {

    "why": "Module D D-integration: Satyananda's account is the canonical Western source for yoga nidrā. With the Buddhist, Trika, and Satyananda mappings all available — Module C Week 3 (AKBh unconditioned dharmas and nirodha), PH sūtra 18 (turīya and turyātīta), Satyananda's four-state protocol — you can teach yoga nidrā without subscribing to any one metaphysical account of what is happening during it. Read analytically: Satyananda's rotation-of-consciousness protocol imports the witness-self as its guiding infrastructure — there is always an 'observer voice' directing attention. Where does the protocol require a self, and where could the instruction be rewritten without one?",

  "S1-W4-LISTEN-berkovich-ohana-meditation-psychedelics-": {

  "S1-W1-WRITE-subtle-body-baseline": {
    "prompt": "Map your current pre-theoretical relationship to the YTT's kosha-prāṇa-chakra ontology. Before letting the philosophical analysis settle, write 500–800 words answering: (1) Which elements of this model do you already teach as literally true, which as useful metaphor, and which as genuinely open questions? Be specific — name actual cues you use. (2) What does it mean for a somatic system to be 'true' for your students even if philosophically contested? (3) Write a single honest sentence naming your current position on ātman — knowing that position will be tested all semester. Don't hedge.",
    "thesis_connection": "This document is your baseline data point for the Teaching Philosophy capstone. The arc from this entry to Week 14 is itself the thesis argument — you are tracing how your pedagogical commitments shift (or don't) under sustained philosophical pressure. Save it somewhere you can re-read it in Week 12."
  },

  "S1-W2-WRITE-causation-in-the-prana-claim": {
    "prompt": "Take one specific prāṇa claim you currently teach — 'prāṇa flows through the nāḍīs,' 'āsana moves stagnant energy,' 'breath bridges body and mind' — and apply MMK Ch. 1's four-condition analysis: (1) Does the effect pre-exist in the cause? (2) Does it arise from a non-cause? (3) From both? (4) From neither? Work through each horn seriously. Then ask: what version of this claim survives? Write the surviving cue — the formulation that does the same pedagogical work without requiring a substantialist causal metaphysics. If nothing survives, say so and explain what you'd replace it with.",
    "thesis_connection": "This exercise is the prototype for your entire cue-log methodology. Each cue that passes the four-condition analysis represents a pedagogically functional claim without metaphysical overreach. That survival test is the core argument of your capstone — you're running it for the first time here."
  },

  "S1-W3-WRITE-three-doors-vs": {
    "prompt": "Write a comparative phenomenology using one body sensation from your own practice this week. (1) Describe it through the tridoṣic lens: which doṣa is dominant, what is its elemental composition, what would Ayurvedic treatment address? (2) Describe the same sensation through the three-doors investigation: body (form/temperature/pressure), energy (prāṇic tone, rhythm), mind (the cognition present, the vedanā, the mental factor). (3) Where do the two accounts converge? Where do they require incompatible ontological commitments — for instance, does the Ayurvedic account require a stable constitutive self that the Abhidharma decomposition denies? Write honestly about which framework feels more useful for teaching and why that preference itself reveals something.",
    "thesis_connection": "You are developing your pluralist methodology here — the skill of holding two frameworks simultaneously without collapsing them into each other or into a false synthesis. That methodology is the philosophical backbone of the capstone."
  },

  "S1-W4-WRITE-three-accounts-of-turiya": {
    "prompt": "Present three accounts of what remains when ordinary mental activity subsides — one each from Satchidananda/Patañjali (Puruṣa as witness), Kṣemarāja's turīya/turyātīta (citi-śakti pervading all states), and Dzogchen's rang rig (self-knowing awareness without center). (1) What is the ontological status of the 'witness' in each? (2) Which account makes the most sense of what actually happens in your Yoga Nidra practice? (3) Write a Yoga Nidra cueing paragraph — 3 to 5 sentences — accurate to each framework. Three different paragraphs. Which would you actually use with students, and what does that choice reveal about your implicit commitments?",
    "thesis_connection": "The cueing paragraph exercise is the heart of the capstone methodology: testing whether different philosophical accounts generate different pedagogical outputs. If they do, philosophy matters practically. If they converge, that convergence itself needs explaining. This is your first live test of the argument."
  },

  "S1-W5-WRITE-the-fascia-as-prana-medium-audit": {
    "prompt": "The YTT proposes fascia as the physical substrate of prāṇic flow. Audit this seriously. (1) What would the interoception research (Anand; Murphy & Brewer) need to show for this claim to be confirmed — what is the empirical burden? (2) Apply Nāgārjuna: does fascia have the intrinsic nature required to be a stable medium? Can a medium of flow exist if neither the medium nor what flows through it has svabhāva? (3) Write your current honest teaching position: do you use fascia-prāṇa language? What is it doing for your students? Draft the interoceptive replacement — same somatic territory, different ontological commitment — and assess whether anything pedagogically essential is lost.",
    "thesis_connection": "This entry stakes out the soma/philosophy/neuroscience triangle that your capstone will need to navigate throughout. You are building evidence for which philosophical vocabulary survives the science test, and which requires the science to carry freight it cannot support."
  },

  "S1-W6-WRITE-a-6-pose-sequence-built-on-dependent-ori": {
    "prompt": "Design a 6-pose sequence using pratītyasamutpāda as your explicit architectural principle. (1) Write the sequence with a one-sentence rationale for each transition: why does pose 2 arise from pose 1? What condition does each pose set for the next? Avoid 'opens,' 'releases,' and 'prepares' — use language of condition-setting and arising. (2) Teach it or rehearse it solo. Write 200 words on where the dependent origination framing failed — where did you reach for old language because the new framing couldn't do the job? (3) What does that resistance reveal about the implicit anthropology baked into standard sequencing language?",
    "thesis_connection": "This is a live test of your translation project: can Madhyamaka logic generate pedagogically functional sequencing without distortion? The failure points are as important as the successes — they tell you the limits of direct philosophical application, which your capstone needs to be honest about."
  },

  "S1-W7-WRITE-the-self-other-boundary-in-prenatal-teac": {
    "prompt": "Prenatal yoga introduces a pedagogical problem with no parallel elsewhere: the student is simultaneously a singular body and a relational field. (1) Which of the four frameworks handles the self-other question in pregnancy most honestly — the YTT kosha model, Madhyamaka's pudgalanairātmya, the AKBh aggregates analysis, or Dzogchen's gzhi? Give your actual reasoning, not a diplomatic summary of each. (2) Write the ethical stakes clearly: what is the difference between cueing a pregnant student to 'connect with your baby' using ātman language versus anātman language? Is there a real clinical difference, or only a philosophical one? (3) Draft a 2-sentence cueing approach for a prenatal class that is honest about the relational complexity.",
    "thesis_connection": "This entry generates the most direct material for the interdependence-as-pedagogy chapter of your capstone. The prenatal case is your sharpest practical test — it makes abstract philosophy about self-and-other immediately concrete and ethically consequential."
  },

  "S1-W8-WRITE-surrender-without-atman": {
    "prompt": "Audit the word 'surrender' as it appears in your teaching. (1) Write three drafts of a Śavāsana cue: Draft A uses full ātman-surrender language (Vedāntic — 'let the self dissolve into pure awareness'). Draft B uses the Trika samāveśa framework (absorption into citi — still has a self-structure but it is Śiva-natured). Draft C removes the surrendering self entirely — there is only the arising of conditions that produce the recognition of stillness; no one surrenders. (2) Which draft works best in a real teaching context? Which is most philosophically accurate? Are these the same answer? (3) If they diverge, what does your choice tell you about the tension between effectiveness and honesty in teaching language?",
    "thesis_connection": "The three-draft exercise is a core methodology the capstone will return to. You are demonstrating that philosophical precision does yield different pedagogical outputs — and making that difference visible, rather than collapsing it into 'it's all the same really,' is the whole point of the thesis."
  },

  "S1-W9-WRITE-three-frameworks-for-a-yin-class": {
    "prompt": "(1) Design a Yin class using the Daoist yin-yang framework as your organizing principle, as the YTT presents it. (2) Redesign the same class using MMK's two truths: conventional truth covers the cues that function, ultimate truth is the background understanding that no pose has intrinsic identity or fixed effect. (3) Redesign it again using abhyāsa-vairāgya as the controlling polarity — sustained effort and non-attachment as the axis, not yin and yang. Write 200 words on: which redesign changes the actual spoken content of the class, and which changes only your internal orientation as teacher? Does that difference matter, and to whom?",
    "thesis_connection": "This is one of your central distinctions for the capstone: some philosophical substitutions change what you say; others change only how you hold what you say. Your thesis needs to be precise about which substitutions do which, and why both kinds are worth making."
  },

  "S1-W10-WRITE-trauma-as-conditioned-pattern-not-stored": {
    "prompt": "The YTT frames trauma as something stored in the body — 'held,' 'stuck,' 'trapped.' Audit this language with precision. (1) Apply the MMK analysis: if trauma is stored, in what dharma is it stored? Can a stored object have intrinsic existence across time? What happens to 'trauma release' language if the answer is no? (2) Write the AKBh alternative: trauma as anuśaya, a latent causal disposition without a substance — not a thing stored but a tendency conditioned. How does this reframe what a trauma-sensitive class is actually addressing? (3) Write your current trauma-language policy: what do you say, what do you avoid, and why? Where does your policy still carry reifying assumptions you have not yet resolved?",
    "thesis_connection": "The stored-object vs. causal-tendency distinction is among the most practically consequential philosophical differences you encounter this semester. This entry will likely generate direct material for the capstone's clinical application section — the argument that Abhidharma categories offer more precise pedagogical tools than substance-based models."
  },

  "S1-W11-WRITE-adaptive-teaching-without-a-normative-bo": {
    "prompt": "Audit your adaptation language. (1) When you modify a pose for a student, what is the implicit normative body you are adapting from? Name it explicitly — whose body is the standard, and how did it get there? (2) Apply upāya-kauśalya (skillful means): if there is no normative body, there is only present capacity meeting present condition. What changes in your cueing when you hold this? (3) Write one adaptation scenario — a specific student, a specific pose — three ways: standard YTT modification language, the upāya-kauśalya reframe, and the AKBh conditional-arising language. Which serves the student best, and what assumptions does your answer rest on?",
    "thesis_connection": "The normative body audit is the equity foundation of the capstone. This entry begins the argument that philosophy of self is not abstract — it determines, in practical detail, whose body the class is designed for."
  },

  "S1-W11-WRITE-cue-log-working-entry-the-brand-question": {
    "prompt": "Read aparigraha as a business ethics principle, not just a personal virtue. (1) Audit your current or intended brand: what are you claiming to offer? Identify three places where your marketing language imports metaphysical claims you are not prepared to philosophically defend. (2) Write the tension honestly: is there a yoga brand that is both commercially viable and philosophically rigorous? What would it require giving up? (3) Draft a one-paragraph bio that is accurate, appealing, and free of undefended metaphysical claims. Read it back. What is it not saying that students probably expect you to say?",
    "thesis_connection": "Your capstone closes with the question of what kind of teacher you intend to be professionally. This entry begins the applied ethics dimension of that answer — it is where the philosophical work meets the economic reality of teaching yoga."
  },

  "S1-W12-WRITE-the-tensions-document-week-12-deliverabl": {
    "prompt": "For each of the four tensions — T1 (ātman/anātman), T2 (svāsaṃvedana/rang rig), T3 (prapañca/māyā), T4 (gzhi vs. ground) — write three sections of 150–200 words each: (1) Your current position, stated as a claim, not a summary of the debate. Where do you actually land and why? (2) The strongest objection to your position from a tradition covered this semester. Steelman it — do not strawman. (3) One teaching cue or pedagogical practice that your position makes possible that an opposing position cannot. The total document should run 800–1200 words. This is your philosophical identity statement for the semester.",
    "thesis_connection": "This document is the structural draft of your capstone. Chapters 1–4 map directly onto T1–T4. The positions you articulate here are the claims your thesis will defend, complicate, and evidence. When you write the capstone, return to this document first."
  },

  "S1-W13-WRITE-uncertain": {
    "prompt": "The Week 13 deliverable is your Cue Log audit — a working document, not an essay. (1) Categorize every cue you have logged this semester by its philosophical commitment: ātman-implying, emptiness-compatible, phenomenologically neutral, Dzogchen-specific, or genuinely unclear. (2) For each ātman-implying cue you want to keep: write the explicit translation — what is the cue actually pointing to, and is there a more accurate formulation that preserves the pedagogical function? (3) For each cue you are retiring: write one sentence on what it was doing for students and whether you have found a replacement. This document has no word target — it is as long as it needs to be.",
    "thesis_connection": "The cue inventory becomes Appendix A of your capstone — the empirical base for your philosophical methodology. It is the evidence that the philosophical work you did this semester generated concrete, practical outputs, not just abstract positions."
  },

  "S1-W14-WRITE-the-teaching-philosophy-statement-week-1": {
    "prompt": "250–400 words. Open with this sentence completed: 'My teaching rests on the claim that ___.' Then: (1) Name the philosophical commitment behind that claim and where in this semester you learned to hold it. (2) Name one thing you believed or taught at the start of the semester that you now hold differently — or no longer hold at all. Be specific about what changed and what changed it. (3) Close with the open question the semester has left you with — the problem your teaching will continue to work on. This is not a summary of what you learned. It is a stake in the ground.",
    "thesis_connection": "This document is the abstract and opening move of your capstone — written before the full thesis is drafted, as an act of accountability to yourself. Return to it when you begin writing. If it no longer fits what you want to argue, that gap is itself the most important thing to write about."
  },

  "S1-W4-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Yoga Nidra)", "content": "Anchor the class in the four-states model (jāgrat/svapna/suṣupti/turīya) using Satyananda's rotation protocol as your structure. Name each state as students move through the practice — this creates the philosophical scaffolding that the other threads can attach to."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "At the turīya transition, briefly introduce Kṣemarāja's sūtra 18: 'One tradition calls this not a fourth state but the ground pervading all three — turīya is not above the others but within them, like the ocean beneath every wave.' This one image reframes the entire practice without requiring explanation."},
      {"thread": "Module B (Madhyamaka)", "content": "At the witness-awareness moment: 'The Madhyamaka tradition raises a precise question here — can awareness witness itself without splitting into observer and observed? If awareness is watching, what is it watching? Sit with this not as a problem but as an open inquiry.' This is enough to activate T2 without disrupting the nidrā state."},
      {"thread": "Module C (Abhidharma)", "content": "Introduce samādhi as omnipresent mental factor in the settling phase: 'Buddhist psychology notes that samādhi — one-pointed attention — is not a special state you achieve; it is present in every moment of experience. The question is only the object. Right now, samādhi has the body as its object.' This normalizes depth without requiring effort."},
      {"thread": "Module A (Dzogchen)", "content": "In the emergence from the practice: 'Dzogchen calls the natural state that nidrā approaches rang rig — self-knowing awareness, awareness that recognizes itself. What is recognized is not a self witnessing experience, but the knowing quality of experience itself. You don't find this; you stop obscuring it.' Keep this for the very end, as students return."}
    ]
  },

  "S1-W5-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Advanced Anatomy)", "content": "Anchor in the nervous system as the physical substrate of prāṇic regulation — ANS, vagal tone, HPA axis. Frame the class as an investigation of how practice conditions the system, not what it corrects or fixes. This keeps the language process-based throughout."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "Introduce the fascia-prāṇa connection as an open scientific hypothesis, not settled fact: 'One current proposal is that fascial tissue may be a medium for subtle energy transmission — this remains genuinely contested in the research. What we can say is that the fascia is densely innervated and interoceptively rich. Whether prāṇa and nerve signal are the same thing, different things, or different maps of the same thing — that question is still live.' This models intellectual honesty."},
      {"thread": "Module B (Madhyamaka)", "content": "On dependent origination and the nervous system: 'The ANS doesn't have intrinsic states — parasympathetic tone isn't a fixed property stored in the body; it arises dependently in relation to breath, posture, attention, context. This is what pratītyasamutpāda looks like somatically. Practice doesn't add calm; it removes the conditions that prevent it from arising.' Use this in any regulation-focused cue."},
      {"thread": "Module C (Abhidharma)", "content": "On the rūpa-skandha: 'Abhidharma identifies the body not as a thing but as a stream of sensory qualities arising under conditions — solidity, cohesion, warmth, motility. What we call the nervous system is a cascade of conditioned events, not a stable object. When you practice interoception, you are tracking that cascade as it arises — not reading a fixed internal state.' Useful in any body-scan sequence."},
      {"thread": "Module A (Dzogchen)", "content": "On the bardo body and sleep: 'The Dzogchen tradition maps the subtle body across states including dream and deep sleep — the channels and winds function differently in each bardo. The sleep stages your nervous system moves through each night are, in this framework, a rehearsal of the dissolution sequence. Knowing this doesn't change the practice; it deepens what rest means.' Keep this brief and contemplative."}
    ]
  },

  "S1-W6-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Advanced Sequencing)", "content": "Teach the class explicitly as an experiment in pratītyasamutpāda sequencing — each pose sets conditions for the next rather than 'opening' or 'preparing' in a causal-substance sense. Name the principle at the start so students can observe it as they practice."},
      {"thread": "Module B (Madhyamaka)", "content": "This is your most direct week for MMK in a class context. At each transition: 'Pose 2 doesn't exist in pose 1, and it doesn't arise from nothing — it arises when these specific conditions are present. This is all dependent origination means: not that everything is connected in a vague spiritual sense, but that nothing arises from its own side.' Keep it precise and brief."},
      {"thread": "Module C (Abhidharma)", "content": "Introduce the six-cause framework as a precision tool: 'Abhidharma identifies six types of cause — the efficient cause, the simultaneous cause, the homogeneous cause, the universal cause, the dominant cause, the retributive cause. When a preparatory pose works, it's usually acting as a homogeneous cause — creating the same type of condition it shares with the peak pose. You don't need to name these; just notice that causation has texture.'"},
      {"thread": "Module D (Kashmir Shaivism)", "content": "Use PH sūtra 8 (unmeṣa/nimeṣa) as a sequencing metaphor: 'Kashmir Shaivism describes consciousness as pulsing between opening (unmeṣa) and closing (nimeṣa). Each pose in a sequence can be read as a nimeṣa — a gathering inward — that enables the next unmeṣa. The sequence breathes.' This gives students a felt sense of the philosophical principle."},
      {"thread": "Module A (Dzogchen)", "content": "On the four thögal visions as natural sequence: 'Dzogchen teaches that realization unfolds in a necessary order — not because a self is progressing, but because conditions ripen in sequence. The same logic applies here: the sequence works not because you are getting better but because the conditions are right.' Use this in the closing to reframe effort."}
    ]
  },

  "S1-W7-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Prenatal Yoga)", "content": "Frame the class around the ethics of interdependence — two bodies, one practice space, no clean boundary. Name this explicitly at the opening: the class is an investigation of what relational practice means when self-and-other is structurally ambiguous."},
      {"thread": "Module B (Madhyamaka)", "content": "MMK Ch. 16–17 (bondage and liberation) and bodhicitta: 'The Mādhyamika tradition argues that the self is not a bounded, independent entity — and prenatal practice makes this viscerally true. Your wellbeing and the developing body's wellbeing are not two separate projects. This is what interdependence means in practice, not in theory.' Keep it warm, not clinical."},
      {"thread": "Module C (Abhidharma)", "content": "On karma and the causal stream: 'AKBh teaches that what we call a person is a causal continuum — a stream of conditions giving rise to conditions. The developing body entering form is, in this framework, a karmic continuum meeting a new set of physical conditions. You are not creating a new self; you are meeting one already in motion.' This reframes the teacher's role in prenatal class."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "PH sūtra 13 (cidānanda-lābha — the attainment of consciousness-bliss): 'Kṣemarāja names the recognition of one's nature as cit and ānanda — consciousness and bliss — as the heart of Trika practice. In a prenatal context: the attunement between mother and developing child is not the merging of two ātmans but something more like two expressions of cit recognizing each other. Use this framing rather than soul-language.'"},
      {"thread": "Module A (Dzogchen)", "content": "On transmission: 'The great aural lineage is transmitted not through text but through direct recognition — from the teacher's awareness to the student's. The mother-child attunement has a similar structure: something is transmitted that precedes language or deliberate intention. Naming this doesn't require Buddhist metaphysics; it simply acknowledges what is already happening in the room.'"}
    ]
  },

  "S1-W8-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Restorative Yoga)", "content": "Frame the class as condition-creation rather than rest-attainment. You are not inducing a state; you are removing the conditions that prevent stillness from arising naturally. This one reframe changes every cue in the class."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "Kṣemarāja's sūtra 19 (samāveśa — immersion/absorption): 'The Trika tradition describes samāveśa as the moment consciousness stops contracting and recognizes its own fullness. Restorative practice is a preparation for that recognition — not by adding something but by withdrawing the conditions of contraction. The props do not give you rest; they remove the effort that obscures it.' Use this in the set-up of any supported pose."},
      {"thread": "Module B (Madhyamaka)", "content": "MMK Ch. 18–20 (Self, Time, Combination): 'The self that needs to surrender in Śavāsana has no intrinsic existence to begin with — it is a construction that becomes visible precisely when you stop maintaining it. What we call letting go is simply the cessation of the activity of self-construction. Nothing is released; something stops being produced.' This reframes 'surrender' without the ātman structure."},
      {"thread": "Module C (Abhidharma)", "content": "On anuśaya (latent dispositions) and restorative practice: 'Abhidharma identifies anuśaya — latent afflictive tendencies — as dispositions that activate under the right conditions. Restorative yoga works by not creating those conditions: no effort, no achievement-orientation, no mirror. It is a deliberate impoverishment of the conditions kleśas need to arise. This is not passive; it is precise.' Use this in the opening orientation."},
      {"thread": "Module A (Dzogchen)", "content": "Praśrabdhi as Abhidharma path quality: 'Buddhist psychology names the quality restorative practice cultivates as praśrabdhi — pliancy, suppleness, the capacity not to be disturbed. This is not relaxation in the ordinary sense; it is a path quality, something trained. What yoga teachers call opening, the Abhidharma calls praśrabdhi.' This gives the practice a precise name without inflating it."}
    ]
  },

  "S1-W9-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Yin Yoga)", "content": "Anchor in long holds as temporal phenomenology — the yin class is an investigation of how phenomena arise, abide, change, and cease. Name this at the opening: students are not stretching fascia; they are studying time."},
      {"thread": "Module B (Madhyamaka)", "content": "MMK Ch. 21–23 (Arising and Ceasing; False Conceptions): 'In a five-minute hold, you can actually observe what svabhāva would have to mean — a sensation that is simply, unchangingly itself. Notice whether that is what you find. What Nāgārjuna argues is that you will never find it, because everything you observe is already in process. The hold is the experiment.' Use this mid-hold, when sensation is most intense."},
      {"thread": "Module C (Abhidharma)", "content": "Saṃskṛta-lakṣaṇa — the four conditioned characteristics: 'Every conditioned phenomenon is marked by arising (utpāda), abiding (sthiti), changing (jarā), and ceasing (vyaya). Abhidharma says these apply to every dharma including their own characteristics. In a long hold, you can track all four in a single sensation: it arises, it stabilizes, it shifts, it passes. Name them as you guide.' This gives students a precise phenomenological vocabulary."},
      {"thread": "Module A (Dzogchen)", "content": "Six bardos as transition maps: 'The Dzogchen tradition describes six bardos — six kinds of in-between state, including the waking bardo, the dream bardo, and the dying bardo. A long yin hold is a micro-bardo: a transition state in which ordinary cognitive continuity is mildly disrupted and recognition becomes possible. The discomfort is not an obstacle; it is the texture of transition.' Use this to reframe resistance in the hold."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "Spanda revisited — PH sūtra 8: 'What appears as the yin principle — stillness, receptivity, inwardness — is, in Kashmir Shaivism, not the absence of Śiva-consciousness but its nimeṣa mode: the inward pulse. Yin is not the opposite of yang; it is cit-śakti in its gathering aspect. Everything the class calls still is vibrating.' Use this in the closing to reframe what students experienced as passive."}
    ]
  },

  "S1-W10-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Trauma-Informed Yoga)", "content": "Frame the class around suffering as process, not possession — kleśas as causal patterns active in the present moment, not objects stored from the past. This reframe is itself the most important trauma-informed move you can make, and it costs nothing in terms of holding space."},
      {"thread": "Module B (Madhyamaka)", "content": "MMK Ch. 24 (Four Noble Truths — the prapañcopaśama verse): 'Duḥkha is dependently originated — which means the one experiencing it does not own it as an intrinsic property of a damaged self. The pattern is active; the self is not broken. This distinction matters enormously in a trauma context: you are not addressing a wounded ātman, you are meeting a causal pattern that can change because it arose dependently.' State this with care; it is clinically significant."},
      {"thread": "Module C (Abhidharma)", "content": "AKBh kleśa taxonomy as clinical precision: 'Abhidharma identifies afflictive mental factors with considerable precision — not just trauma as a lump but specific factors: fear, aversion, contraction, self-referential narrative, the confusion between vedanā and proliferation. When you can name what specific mental factor is active in a trauma response, you remove some of its reifying power. You do not need to use these terms in class; just think with them.' Model precision even when the language stays simple."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "Tirodhāna (concealment) from PH sūtra 1: 'One of the five activities of citi-śakti is tirodhāna — concealment, the veil that citi draws over its own nature. In a trauma context, this offers a different map: what appears as damage is consciousness concealing itself from itself. Liberation is not repair but recognition. This framing is available to you; use it if it fits your student relationships.' This is optional but can be powerful for students already in the Trika framework."},
      {"thread": "Module A (Dzogchen)", "content": "Bardo teachings and dissolution: 'The YNS bardo teachings describe moments of dissolution — sudden breaks in ordinary cognitive continuity — as opportunities for recognition. Trauma responses often have this structure: a sudden dissolution of the sense of solid ground. The bardo framework offers a positive vocabulary for what feels catastrophic: this is a transition, and transitions are where recognition becomes possible. You are not teaching this; you are holding it as your own orientation.' Let this inform how you presence, not what you say."}
    ]
  },

  "S1-W11-RECORD-module-focused-class-youtube": {
    "tips": [
      {"thread": "Frame (YTT — Adaptive Yoga)", "content": "Open by framing adaptation not as exception but as the default practice design. There is no normative body; there is only present capacity meeting present condition. Name this explicitly — you are not scaling down a template, you are designing from where your student actually is."},
      {"thread": "Module B (Madhyamaka)", "content": "Upāya-kauśalya (skillful means) as a structural principle: the teaching adapts to the capacity of the listener, not the other way. Mention briefly: 'The tradition calls this upāya — the method is always contingent on conditions. There is no one correct pose; there is only the pose that sets the right conditions for this body today.'"},
      {"thread": "Module C (Abhidharma)", "content": "The rūpa-skandha as momentary qualities of experience rather than a fixed body: 'Abhidharma describes the body as a stream of sensory qualities — solidity, warmth, motility, cohesion — arising under conditions. Not a fixed structure to be aligned, but a cascade of events. Adaptation is reading those events accurately.' Use this to reframe modification as precision rather than accommodation."},
      {"thread": "Module A (Dzogchen)", "content": "The natural state has no normative expression: 'In the Great Perfection, rigpa is not achieved through a correct posture or a properly functioning body — it is recognized in whatever condition presents itself. The practice is recognition, not optimization.' This is the most radical framing of adaptive yoga available; deploy it carefully."},
      {"thread": "Module D (Kashmir Shaivism)", "content": "PH sūtra 17 (the contracted experient): 'Kṣemarāja describes the individual as citi in contracted form. Disability, limitation, and constraint are, in this framework, not defects — they are specific modes of citi's self-expression. Adaptive yoga meets citi where it actually is.' Keep this as your own orientation; you don't need to say it in class."}
    ]
  },

  "S1-W1-LISTEN-malcolm-akbh-s1c1": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 1",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Series I opens with Malcolm's own framing of the eight-week course: four chapters across eight weeks, half the verses per chapter per class. Class 1 covers Ch. 1 (Dhātunirdeśa): the three senses of 'Abhidharma' (pure wisdom, its attendant dharmas, the śāstra itself), the definition of the Abhidharma project as dharma enumeration, the sarva-dharma triad (conditioned, unconditioned, unknowable), and the foundational distinction between saṃskṛta and asaṃskṛta dharmas. Malcolm's key framing from Class 1: the AKBh is essentially a physics of experience — a rigorous catalogue of what actually arises in the mind-body continuum. Listen for Malcolm's opening statement about why Abhidharma matters for Mahāyāna practitioners: the dharma-catalogue is the object that the Mādhyamika emptiness analysis subsequently analyzes.",
    "module_reference": "Module C, Week 1",
    "cross_refs": ["S1-W1-READ-module-c-wk-1-akbh-ch-1-i15-sangpo-vol-1"]
  },

  "S1-W2-LISTEN-malcolm-akbh-s1c1cont-c2p1": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 1 (cont.) + Class 2, Part 1",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Covers the second half of Ch. 1 (Dhātunirdeśa): the rūpa-skandha analysis — four mahābhūtas as sensory qualities (solidity/cohesion/heat/motility), not substances; the eight-substance molecule (aṣṭa-dravya-rūpa); avijñapti-rūpa (non-informative matter — the claim that taking vows materially alters the rūpa-skandha). Malcolm's famous teaching in this section: 'you are sharing a material aggregate with everyone in this room right now' — the radical non-boundary implication of rūpa-skandha analysis. Also covers the eighteen dhātus in overview. Class 2 Part 1 begins the formal five-skandha analysis. Listen for Malcolm's treatment of paramāṇu (the atom) — Abhidharma asserts atoms but cannot locate them as a single entity or as a collection, which is the seed of Vasubandhu's later Vijñānavāda critique.",
    "module_reference": "Module C, Week 2",
    "cross_refs": ["S1-W2-READ-module-c-wk-2-akbh-ch-1-i628-rupa-skandh"]
  },

  "S1-W3-LISTEN-malcolm-akbh-s1c2": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 2",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Series I, Class 2 (Parts 1–2) completes Ch. 1: the five upādāna-skandhas formally defined with Malcolm's key gloss ('addictive aggregates' — you are helplessly addicted to rebirth). The three unconditioned dharmas — ākāśa (unobstructed space), pratisaṃkhyā-nirodha (analytical cessation — the path-result), and apratisaṃkhyā-nirodha (non-analytical cessation — simple absence of a cause). The saṃskṛta-lakṣaṇa analysis: the four conditioned characteristics (arising, abiding, change, ceasing) apply reflexively to their own characteristics. This reflexivity is philosophically rich — listen for Malcolm's explanation of why the characteristics of conditioned dharmas are themselves conditioned, and what that implies for the stability of any dharmic event.",
    "module_reference": "Module C, Week 3",
    "cross_refs": ["S1-W3-READ-module-c-wk-3-akbh-ch-1-i515-five-skandh"]
  },

  "S1-W4-LISTEN-malcolm-akbh-s1c3": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 3",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Series I, Class 3 (Parts 1–2) covers Ch. 2 (Indriyanirdeśa): the 22 indriyas — five sense faculties, the mind-faculty, two gender-indriyas, the life-faculty, five sensation-indriyas, and the three pure faculties (ajñātamājñāsyāmīndriya, ājñendriya, ājñātāvindriya). Malcolm's pedagogical distinction: 14 indriyas keep us in saṃsāra; 8 support liberation. The five liberating faculties — faith (śraddhā), energy (vīrya), mindfulness (smṛti), samādhi, prajñā — are the path dharmas of Abhidharma practice. Malcolm's teaching on samādhi as an omnipresent mental factor is introduced here: samādhi is not a special achievement; it is present in every moment of experience. For your YTT context: the indriya taxonomy maps directly onto the somatic turn in modern yoga — listen for how Vasubandhu's account of the sense-sphere differs from the kosha-based model of the same territory.",
    "module_reference": "Module C, Week 4",
    "cross_refs": ["S1-W4-READ-module-c-wk-4-akbh-ch-2-samskara-citta-m"]
  },

  "S1-W5-LISTEN-malcolm-akbh-s1c4": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 4",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Series I, Class 4 (Parts 1–2) continues Ch. 2: citta (mind) and caitta (mental factors) — the mahābhūmika system. Mahābhūmika dharmas are mental factors present in every moment of mind: feeling-tone (vedanā), intention (cetanā), attention (manaskāra), contact (sparśa), desire (chanda), and others. The cittaviprayukta dharmas (factors dissociated from mind — conditioned formations without clear somatic or mental placement) include prāpti (the acquisition of a dharma), which is the mechanism by which karma 'belongs' to a particular mindstream without requiring a self as owner. Malcolm's Class 4 also covers the disputed question of whether the mind in samādhi still has cetanā — a question directly relevant to the Yoga Nidra material in Week 4 of Module D. Listen for his treatment of which mahābhūmika dharmas are present in the various absorptions.",
    "module_reference": "Module C, Week 5",
    "cross_refs": ["S1-W5-READ-module-c-wk-5-akbh-ch-2-cittaviprayukta-"]
  },

  "S1-W6-LISTEN-malcolm-akbh-s1c5-c6": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Classes 5–6",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Class 5 (Part 1) completes Ch. 2 with the six causes (hetu), four conditions (pratyaya), and five results (phala) — the AKBh's complete theory of causation. This is where Malcolm delivers his famous refutation of Īśvara using Vasubandhu's single-cause argument: 'the world does not proceed from a single cause.' The logic: if a single, permanent cause produces the world, it either always produces it (making the world permanent) or never does (making the world impossible). This argument is performed in Ch. 2, not Ch. 9 — an important structural note. Class 6 opens Ch. 3 (Lokanirdeśa): three realms, six destinies, four types of birth, four dhyāna heavens, four ārūpya-samāpatti, and the antarābhava/bardo — the intermediate state between death and rebirth.",
    "module_reference": "Module C, Week 6",
    "cross_refs": ["S1-W6-READ-module-c-wk-6-akbh-ch-3-loka-sentient-be"]
  },

  "S1-W7-LISTEN-malcolm-akbh-s1c6-c7": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Classes 6–7",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Class 6 (Parts 1–2) covers Ch. 3 in full cosmological detail: the four dhyāna heavens and their inhabitants, the four formless absorptions as cosmological locations, and the antarābhava/bardo analysis — a subtle body (gandharva) that seeks a womb-birth. This is the first appearance of dhyāna content in the AKBh, framed cosmologically rather than technically (the technical meditation-factor analysis belongs to Ch. 8). Class 7 (Parts 1–2) covers the twelve nidānas (pratītyasamutpāda) across three lifetimes: the three-lifetime dependent origination model distributing the twelve factors — ignorance and formations in a past life; consciousness through sensation as present-life effects; craving through existence as present-life causes; birth, aging, and death as future-life results. Listen for Malcolm's explanation of why the twelve-nidāna model necessarily spans three lifetimes.",
    "module_reference": "Module C, Week 7",
    "cross_refs": ["S1-W7-READ-module-c-wk-7-akbh-ch-4-karma-opens-the-"]
  },

  "S1-W8-LISTEN-malcolm-akbh-s1c7": {
    "speaker": "Ācārya Malcolm Smith",
    "talk_title": "AKBh Series I, Class 7",
    "source": "Malcolm Smith Abhidharma Series (recordings)",
    "why": "Series I, Class 7 (Parts 1–2) completes Ch. 3 with the full treatment of the twelve nidānas / pratītyasamutpāda across three lifetimes. The key structural teaching: the twelve nidānas are not a linear sequence through time but a multi-lifetime causal architecture. Malcolm's explanation of why pratītyasamutpāda requires multiple lifetimes to function as the AKBh describes is the most direct engagement with the rebirth question in Module C. Listen carefully for how the twelve-nidāna model depends on continuity of causal momentum across death — and what that implies for secular interpretations of dependent origination that confine it to a single lifetime or even to moment-to-moment arising.",
    "module_reference": "Module C, Week 8",
    "cross_refs": ["S1-W8-READ-module-c-wk-8-akbh-ch-5-anusaya-latent-d"]
  },

  "S1-W9-LISTEN-malcolm-akbh-s1c8-s2c1p1": {

// ── Geometry helpers ───────────────────────────────────────────────────────

function weekAngle(weekNum) {
  return ((weekNum - 1) / 14) * 2 * Math.PI - Math.PI / 2;
}

function weekPos(weekNum) {
  const a = weekAngle(weekNum);
  return { x: CX + RING_R * Math.cos(a), y: CY + RING_R * Math.sin(a) };
}

function satPos(weekNum, slotIndex, totalSlots) {
  const outward = weekAngle(weekNum);
  // Use subset of offsets centered for the item count
  const offsets = SAT_ANGLE_OFFSETS.slice(0, Math.min(totalSlots, 5));
  const offsetDeg = offsets[slotIndex] || 0;
  const angle = outward + (offsetDeg * Math.PI / 180);
  const { x: wx, y: wy } = weekPos(weekNum);
  return {
    x: wx + SAT_DIST * Math.cos(angle),
    y: wy + SAT_DIST * Math.sin(angle),
  };
}

// ── SVG helpers ────────────────────────────────────────────────────────────

const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, children = []) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function htmlEl(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
